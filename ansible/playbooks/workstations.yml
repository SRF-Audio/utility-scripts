---
# playbooks/workstations.yml
#
# Brings a native Fedora Workstation (desktop or laptop) to a fully provisioned
# state. Replaces the prior Aurora-DX + distrobox split setup — everything that
# used to come from flatpak/rpm-ostree/distrobox is now codified here.
#
# Run locally on the target machine (bootstrap.sh does this for you):
#   ansible-playbook playbooks/workstations.yml --limit "$(hostname)"
#
# Per-machine behavior comes from inventory group_vars (laptops.yml / desktops.yml):
# the NVIDIA + ASUS hardware role only engages on the laptop.
#
# Role order matters:
#   nextdns_resolver → pins DNS to our NextDNS profile before anything else
#                      hits the network, so per-network DHCP DNS can't filter
#                      package/flatpak downloads unexpectedly
#   base_packages   → enables RPM Fusion (prereq for NVIDIA), full dnf upgrade,
#                      + core packages
#   repos_services  → installs docker-ce (prereq for the NVIDIA runtime hook)
#   nvidia_asus_hw  → driver + container toolkit + ASUS tooling (laptop only)
#   op_install      → installs the 1Password CLI (prereq for op_validator/git_identity)
#   yubikey_setup   → hardware key tooling
#   op_validator    → fails fast with a clear message if OP_SERVICE_ACCOUNT_TOKEN
#                      isn't exported, instead of a cryptic error deep in op_read
#   git_identity    → writes ~/.gitconfig (includeIf routing), .gitconfig-github/
#                      -gitlab, and allowed_signers from 1Password — requires
#                      OP_SERVICE_ACCOUNT_TOKEN exported before running this playbook
#   oh_my_zsh_install → installs oh-my-zsh + Powerlevel10k (framework only)
#   dotfiles        → symlinks our version-controlled .zshrc/.tmux.conf/etc.
#                      over the stock files oh_my_zsh_install generated

- name: Provision native Fedora workstation
  hosts: desktops:laptops
  gather_facts: true
  connection: local
  roles:
    - role: nextdns_resolver
      tags: [nextdns_resolver, dns]

    - role: base_packages
      tags: [base_packages, packages]

    - role: repos_services
      tags: [repos_services, repos]

    - role: nvidia_asus_hw
      tags: [nvidia_asus_hw, hardware]
      when: >-
        (nvidia_asus_hw_enable_nvidia | default(false)) or
        (nvidia_asus_hw_enable_asusctl | default(false)) or
        (nvidia_asus_hw_enable_supergfxctl | default(false))

    - role: op_install
      tags: [op_install, onepassword_cli]
      vars:
        op_install_artifacts_path: "{{ artifacts_path }}/op_install"

    - role: yubikey_setup
      tags: [yubikey_setup, yubikey]

    - role: op_validator
      tags: [op_validator, git_identity, git]
      when: lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') | length > 0
      vars:
        op_validator_artifacts_path: "{{ artifacts_path }}/op_validator"
        op_validator_op_account_type: SERVICE_ACCOUNT
        op_validator_op_service_account_token: "{{ lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') }}"

    - role: git_identity
      tags: [git_identity, git]
      vars:
        git_identity_artifacts_path: "{{ artifacts_path }}/git_identity"
        git_identity_op_service_account_token: "{{ lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') }}"
        git_identity_user_name: SRF-Audio
        git_identity_user_name_gitlab: sfroeber
        git_identity_user_email_github: stephen.froeber@gmail.com
        git_identity_user_email_gitlab: sfroeber@altitude.cloud
        git_identity_github_signing_pubkey_item: HomeLab/github-ssh
        git_identity_enable_gitlab_signing: true
        git_identity_gitlab_signing_pubkey_item: "Work/GitLab CACI SSH Key"
        git_identity_run_validation_tests: false

    - role: tailscale_install
      tags: [tailscale]

    - role: k9s_install
      tags: [k9s]

    - role: oh_my_zsh_install
      tags: [oh_my_zsh, shell]

    - role: dotfiles
      tags: [dotfiles]

    - role: flatpak_apps
      tags: [flatpak_apps, flatpak]

    - role: audio
      tags: [audio]

    - role: kde
      tags: [kde]
