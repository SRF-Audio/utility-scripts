---
# cluster-connector.yml
#
# Makes any blank control node permanently ready to manage all k3s clusters:
#   - coachlight-k3s-cluster (homelab, Proxmox VMs on Tailscale)
#   - hetzner               (single-node Hetzner Cloud, Tailscale)
#   - k3d-<name>            (local dev via k3d on Aurora-DX; skipped if k3d absent)
#
# Idempotent: safe to re-run on machines that are already connected.
#
# Prerequisites:
#   - Tailscale active and on the rohu-shark.ts.net tailnet
#   - 1Password CLI authenticated (op signin, or OP_SERVICE_ACCOUNT_TOKEN set)
#   - For homelab: homelab cluster must be running (kubeconfig is fetched live via SSH)
#   - For hetzner: cluster bootstrapped (kubeconfig stored in 1Password during bootstrap)
#
# Usage (from ansible/):
#   All clusters:     ansible-playbook -i inventories/hosts.yml playbooks/cluster-connector.yml
#   Homelab only:     ansible-playbook -i inventories/hosts.yml playbooks/cluster-connector.yml --tags cluster_connector_homelab
#   Hetzner only:     ansible-playbook -i inventories/hosts.yml playbooks/cluster-connector.yml --tags cluster_connector_hetzner
#   k3d local only:   ansible-playbook -i inventories/hosts.yml playbooks/cluster-connector.yml --tags cluster_connector_k3d_local
#   Custom cluster:   ansible-playbook ... --tags cluster_connector_k3d_local -e k3d_cluster_name=mycluster
#   Via site.yml:     ansible-playbook site.yml --tags cluster_connector
#
# Note: k3d play must be run from the Aurora-DX host (not Distrobox) — k3d is host-only.
#       Distrobox uses --network host, so 127.0.0.1 in the kubeconfig reaches the host.

# ─── Play 1: SSH key + k9s ───────────────────────────────────────────────────
- name: Prepare control node — SSH key and k9s
  hosts: local
  gather_facts: true
  tags:
    - cluster_connector
    - cluster_connector_homelab
    - cluster_connector_hetzner

  tasks:
    - name: Check if SSH private key exists
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.ssh/coachlight-homelab.pem"
      register: _cc_ssh_key_stat

    - name: Write SSH private key from 1Password (if missing)
      ansible.builtin.copy:
        dest: "{{ lookup('env', 'HOME') }}/.ssh/coachlight-homelab.pem"
        content: >-
          {{ lookup('community.general.onepassword',
                    'coachlight-homelab SSH key',
                    field='private key',
                    vault='HomeLab') }}
        mode: "0600"
      when: not _cc_ssh_key_stat.stat.exists
      no_log: true

    - name: Ensure ~/.ssh/config.d exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.ssh/config.d"
        state: directory
        mode: "0700"

  roles:
    - role: k9s_install

# ─── Play 2: coachlight-k3s-cluster (homelab) ────────────────────────────────
- name: Connect to coachlight-k3s-cluster (homelab)
  hosts: local
  gather_facts: true
  tags:
    - cluster_connector
    - cluster_connector_homelab

  vars:
    # Required by k8s_validator and kubeconfig_manager internally
    k3s_cluster_name: coachlight-k3s-cluster
    k3s_context_name: coachlight-k3s-cluster
    k3s_user_name: sfroeber
    k3s_cluster_domain: rohu-shark.ts.net
    k3s_api_server_url: "https://k3s-cp-1.{{ k3s_cluster_domain }}:6443"

  tasks:
    - name: Fetch homelab kubeconfig from k3s-cp-1
      ansible.builtin.include_role:
        name: k3s_kubeconfig_retriever
      vars:
        # k3s-cp-1 is the first host in the k3s_control_plane group (default),
        # but we name it explicitly for clarity.
        k3s_kubeconfig_retriever_control_plane_host: k3s-cp-1

    - name: Merge homelab kubeconfig into ~/.kube/config
      ansible.builtin.include_role:
        name: kubeconfig_manager
      vars:
        kubeconfig_manager_source_kubeconfig_path: >-
          {{ k3s_kubeconfig_retriever_artifacts.local_output_path }}
        kubeconfig_manager_cluster_name: "{{ k3s_cluster_name }}"
        kubeconfig_manager_cluster_server: "{{ k3s_api_server_url }}"
        kubeconfig_manager_context_name: "{{ k3s_context_name }}"
        kubeconfig_manager_context_user: "{{ k3s_user_name }}"

    - name: Write SSH config entries for all homelab k3s nodes
      ansible.builtin.blockinfile:
        path: "{{ lookup('env', 'HOME') }}/.ssh/config.d/30-homelab-k3s.conf"
        create: true
        mode: "0600"
        marker: "# {mark} ANSIBLE MANAGED — homelab-k3s-nodes"
        block: |
          Host k3s-cp-1
              HostName k3s-cp-1.rohu-shark.ts.net
              User sfroeber
              IdentityFile ~/.ssh/coachlight-homelab.pem
              IdentitiesOnly yes
              StrictHostKeyChecking accept-new

          Host k3s-cp-2
              HostName k3s-cp-2.rohu-shark.ts.net
              User sfroeber
              IdentityFile ~/.ssh/coachlight-homelab.pem
              IdentitiesOnly yes
              StrictHostKeyChecking accept-new

          Host k3s-cp-3
              HostName k3s-cp-3.rohu-shark.ts.net
              User sfroeber
              IdentityFile ~/.ssh/coachlight-homelab.pem
              IdentitiesOnly yes
              StrictHostKeyChecking accept-new

          Host k3s-wkr-1
              HostName k3s-wkr-1.rohu-shark.ts.net
              User sfroeber
              IdentityFile ~/.ssh/coachlight-homelab.pem
              IdentitiesOnly yes
              StrictHostKeyChecking accept-new

          Host k3s-wkr-2
              HostName k3s-wkr-2.rohu-shark.ts.net
              User sfroeber
              IdentityFile ~/.ssh/coachlight-homelab.pem
              IdentitiesOnly yes
              StrictHostKeyChecking accept-new

          Host k3s-wkr-3
              HostName k3s-wkr-3.rohu-shark.ts.net
              User sfroeber
              IdentityFile ~/.ssh/coachlight-homelab.pem
              IdentitiesOnly yes
              StrictHostKeyChecking accept-new

    - name: Validate homelab cluster connectivity
      ansible.builtin.include_role:
        name: k8s_validator
      vars:
        k8s_validator_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        k8s_validator_context: >-
          {{ kubeconfig_manager_artifacts.context_name }}
        k8s_validator_install_packages: false

# ─── Play 3: hetzner k3s cluster ─────────────────────────────────────────────
- name: Connect to hetzner k3s cluster
  hosts: local
  gather_facts: true
  tags:
    - cluster_connector
    - cluster_connector_hetzner

  vars:
    # Required by k8s_validator internally — set to hetzner cluster name
    k3s_cluster_name: hetzner
    _hetzner_kubeconfig_path: "{{ lookup('env', 'HOME') }}/.kube/hetzner-k3s.yaml"

  tasks:
    - name: List all items in HomeLab vault
      ansible.builtin.command:
        cmd: op item list --vault HomeLab --format json
      register: _op_items_raw
      changed_when: false
      no_log: true

    - name: Verify hetzner kubeconfig item exists in 1Password
      ansible.builtin.assert:
        that:
          - >-
            (_op_items_raw.stdout | from_json)
            | selectattr('title', 'equalto', 'Hetzner k3s Kubeconfig')
            | list | length > 0
        fail_msg: >-
          No 1Password item named "Hetzner k3s Kubeconfig" found in HomeLab vault.
          Run the Hetzner bootstrap first (hetzner/ansible/site.yml).

    - name: Resolve UUID of most recently updated hetzner kubeconfig item
      ansible.builtin.set_fact:
        _hetzner_item_id: >-
          {{
            (_op_items_raw.stdout | from_json)
            | selectattr('title', 'equalto', 'Hetzner k3s Kubeconfig')
            | sort(attribute='updated_at')
            | map(attribute='id')
            | list
            | last
          }}

    - name: Read hetzner kubeconfig from 1Password by item UUID
      ansible.builtin.command:
        argv:
          - op
          - read
          - "op://HomeLab/{{ _hetzner_item_id }}/kubeconfig"
      register: _hetzner_kubeconfig_raw
      changed_when: false
      no_log: true

    - name: Write hetzner kubeconfig to disk
      ansible.builtin.copy:
        dest: "{{ _hetzner_kubeconfig_path }}"
        content: "{{ _hetzner_kubeconfig_raw.stdout }}"
        mode: "0600"
      no_log: true

    - name: Parse hetzner API server URL from kubeconfig
      ansible.builtin.set_fact:
        _hetzner_api_server: >-
          {{ (lookup('file', _hetzner_kubeconfig_path) | from_yaml).clusters[0].cluster.server }}

    - name: Parse hetzner Tailscale IP from API server URL
      ansible.builtin.set_fact:
        _hetzner_tailscale_ip: >-
          {{ _hetzner_api_server | regex_replace('^https://(.+):6443$', '\1') }}
        # k3s_cluster_domain is required by k8s_validator — for hetzner it's the Tailscale IP
        k3s_cluster_domain: >-
          {{ _hetzner_api_server | regex_replace('^https://(.+):6443$', '\1') }}

    - name: Merge hetzner kubeconfig into ~/.kube/config
      ansible.builtin.include_role:
        name: kubeconfig_manager
      vars:
        kubeconfig_manager_source_kubeconfig_path: "{{ _hetzner_kubeconfig_path }}"
        kubeconfig_manager_cluster_name: hetzner
        kubeconfig_manager_cluster_server: "{{ _hetzner_api_server }}"
        kubeconfig_manager_context_name: hetzner
        kubeconfig_manager_context_user: sfroeber

    - name: Write hetzner-node SSH config entry
      ansible.builtin.blockinfile:
        path: "{{ lookup('env', 'HOME') }}/.ssh/config.d/35-hetzner.conf"
        create: true
        mode: "0600"
        marker: "# {mark} ANSIBLE MANAGED — hetzner-node"
        block: |
          Host hetzner-node
              HostName {{ _hetzner_tailscale_ip }}
              User root
              IdentityFile ~/.ssh/coachlight-homelab.pem
              IdentitiesOnly yes
              StrictHostKeyChecking accept-new

    - name: Validate hetzner cluster connectivity
      ansible.builtin.include_role:
        name: k8s_validator
      vars:
        k8s_validator_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        k8s_validator_context: hetzner
        k8s_validator_install_packages: false

# ─── Play 4: k3d local dev cluster (Aurora-DX host) ─────────────────────────
- name: Connect to k3d local dev cluster
  hosts: local
  gather_facts: true
  tags:
    - cluster_connector
    - cluster_connector_k3d_local

  vars:
    _k3d_cluster_name: "{{ k3d_cluster_name | default('dev') }}"
    # k3s_cluster_domain is required by k8s_validator — localhost for a local cluster
    k3s_cluster_domain: localhost

  tasks:
    - name: Check if k3d is available
      ansible.builtin.command:
        cmd: which k3d
      register: _k3d_which
      changed_when: false
      failed_when: false

    - name: Skip play when k3d is not installed
      ansible.builtin.meta: end_play
      when: _k3d_which.rc != 0

    - name: Get k3d cluster kubeconfig
      ansible.builtin.command:
        cmd: k3d kubeconfig get {{ _k3d_cluster_name }}
      register: _k3d_kubeconfig_raw
      changed_when: false

    - name: Parse k3d API server URL from kubeconfig
      ansible.builtin.set_fact:
        _k3d_api_server: >-
          {{ (_k3d_kubeconfig_raw.stdout | from_yaml).clusters[0].cluster.server
             | replace('0.0.0.0', '127.0.0.1') }}

    - name: Merge k3d kubeconfig into ~/.kube/config
      ansible.builtin.include_role:
        name: kubeconfig_manager
      vars:
        kubeconfig_manager_source_kubeconfig_content: "{{ _k3d_kubeconfig_raw.stdout }}"
        kubeconfig_manager_cluster_name: "k3d-{{ _k3d_cluster_name }}"
        kubeconfig_manager_cluster_server: "{{ _k3d_api_server }}"
        kubeconfig_manager_context_name: "k3d-{{ _k3d_cluster_name }}"
        kubeconfig_manager_context_user: sfroeber

    - name: Validate k3d cluster connectivity
      ansible.builtin.include_role:
        name: k8s_validator
      vars:
        k8s_validator_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        k8s_validator_context: "k3d-{{ _k3d_cluster_name }}"
        k8s_validator_install_packages: false
