---
- name: Check if oh-my-zsh is installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.oh-my-zsh"
  register: omz

- name: Download oh-my-zsh installer script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
    dest: /tmp/omz_install.sh
    mode: "0755"
  when: not omz.stat.exists

- name: Run oh-my-zsh installer
  ansible.builtin.command: /tmp/omz_install.sh --unattended
  args:
    creates: "{{ ansible_env.HOME }}/.oh-my-zsh"
    executable: /bin/zsh
  when: not omz.stat.exists

- name: Ensure local fonts directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/share/fonts"
    state: directory
    mode: "0755"

- name: Install MesloLGS NF fonts for Powerlevel10k
  ansible.builtin.get_url:
    url: "{{ item }}"
    dest: "{{ ansible_env.HOME }}/.local/share/fonts/{{ item | basename }}"
    mode: "0644"
  loop:
    - https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Regular.ttf
    - https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold.ttf
    - https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Italic.ttf
    - https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold%20Italic.ttf
  register: meslo_fonts

- name: Check if fontconfig is installed
  ansible.builtin.command:
    cmd: which fc-cache
  register: oh_my_zsh_fc_cache_check
  changed_when: false
  failed_when: false

- name: Install fontconfig package
  ansible.builtin.package:
    name: fontconfig
    state: present
  become: true
  when: oh_my_zsh_fc_cache_check.rc != 0

- name: Refresh font cache
  ansible.builtin.command:
    cmd: fc-cache -f
  when: meslo_fonts is changed
  changed_when: false

- name: Define Konsole profile variables
  ansible.builtin.set_fact:
    konsole_profile_name: "Powerlevel10k"
    konsole_profile_path: "{{ ansible_env.HOME }}/.local/share/konsole/Powerlevel10k.profile"
    konsole_font_value: "MesloLGS NF,10,-1,5,50,0,0,0,0,0"

- name: Ensure Konsole profile directory exists
  ansible.builtin.file:
    path: "{{ konsole_profile_path | dirname }}"
    state: directory
    mode: "0755"

- name: Ensure Konsole profile file exists (no overwrite)
  ansible.builtin.file:
    path: "{{ konsole_profile_path }}"
    state: touch
    mode: "0600"

- name: Set Konsole profile name
  community.general.ini_file:
    path: "{{ konsole_profile_path }}"
    section: "General"
    option: "Name"
    value: "{{ konsole_profile_name }}"
    no_extra_spaces: true
    mode: "0600"

- name: Set Konsole profile font to MesloLGS NF
  community.general.ini_file:
    path: "{{ konsole_profile_path }}"
    section: "Appearance"
    option: "Font"
    value: "{{ konsole_font_value }}"
    no_extra_spaces: true
    mode: "0600"

- name: Make this the default Konsole profile
  community.general.ini_file:
    path: "{{ ansible_env.HOME }}/.config/konsolerc"
    section: "Desktop Entry"
    option: "DefaultProfile"
    value: "{{ konsole_profile_name }}.profile"
    no_extra_spaces: true
    mode: "0600"

- name: Clone Powerlevel10k theme into oh-my-zsh custom themes directory
  ansible.builtin.git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/themes/powerlevel10k"
    depth: 1
    version: master

- name: Set ZSH_THEME to "powerlevel10k" in .zshrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    regexp: "^ZSH_THEME="
    line: 'ZSH_THEME="powerlevel10k/powerlevel10k"'

- name: Stat ~/.p10k.zsh before copying
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.p10k.zsh"
    follow: false
  register: oh_my_zsh_p10k_stat

- name: Install Powerlevel10k config (skip if already a symlink managed by dotfiles)
  ansible.builtin.copy:
    src: p10k.zsh
    dest: "{{ ansible_env.HOME }}/.p10k.zsh"
    mode: "0644"
  when: not (oh_my_zsh_p10k_stat.stat.exists and oh_my_zsh_p10k_stat.stat.islnk)

- name: Ensure Powerlevel10k config is sourced from .zshrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    regexp: '^\[\[ ! -f ~/.p10k.zsh \]\] \|\| source ~/.p10k.zsh'
    line: "[[ ! -f ~/.p10k.zsh ]] || source ~/.p10k.zsh"
    insertafter: "^ZSH_THEME="  # or wherever you like

- name: Determine zsh binary path
  ansible.builtin.command:
    cmd: which zsh
  register: oh_my_zsh_zsh_binary_check
  changed_when: false

- name: Get current login shell
  ansible.builtin.command:
    cmd: getent passwd {{ ansible_user_id }}
  register: oh_my_zsh_passwd_entry
  changed_when: false

- name: Set zsh as the default login shell
  ansible.builtin.command:
    cmd: chsh -s {{ oh_my_zsh_zsh_binary_check.stdout }}
  when: oh_my_zsh_passwd_entry.stdout.split(':')[-1] != oh_my_zsh_zsh_binary_check.stdout
  changed_when: true

- name: Set Konsole profile shell to zsh
  community.general.ini_file:
    path: "{{ konsole_profile_path }}"
    section: "General"
    option: "Command"
    value: "{{ oh_my_zsh_zsh_binary_check.stdout }}"
    no_extra_spaces: true
    mode: "0600"
