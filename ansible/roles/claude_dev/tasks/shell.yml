---
# claude_dev/tasks/shell.yml
#
# Shell integration is now handled by the dotfiles role, which symlinks the
# version-controlled ~/.zshrc (containing PATH, aliases, and op completions)
# into place.
#
# This task file just asserts the symlink is present so claude_dev fails
# loudly if someone runs it without running dotfiles first.

- name: Check that ~/.zshrc is symlinked (dotfiles role must run first)
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.zshrc"
    follow: false
  register: _zshrc_stat

- name: Warn if ~/.zshrc is not a symlink to the dotfiles repo
  ansible.builtin.debug:
    msg: >-
      WARNING: ~/.zshrc is not a symlink to the dotfiles repo.
      Run the dotfiles role (ansible-playbook ... --tags dotfiles) to set it up.
      Claude Code PATH and aliases may be missing until then.
  when: not _zshrc_stat.stat.islnk
