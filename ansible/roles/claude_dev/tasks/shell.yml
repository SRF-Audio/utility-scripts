---
- name: Remove Claude Code shell block if mispositioned
  ansible.builtin.blockinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    marker: "# {mark} ANSIBLE MANAGED - claude_dev"
    state: absent

- name: Add Claude Code shell integration to .zshrc before tmux auto-launch
  ansible.builtin.blockinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    marker: "# {mark} ANSIBLE MANAGED - claude_dev"
    insertbefore: "if \\[\\[ -o interactive \\]\\]"
    block: |
      # PATH additions for Claude Code
      export PATH="{{ claude_dev_npm_global_prefix }}/bin:$HOME/.local/bin:$PATH"

      # Claude Code aliases
      {% for alias, cmd in claude_dev_zsh_aliases.items() %}
      alias {{ alias }}='{{ cmd }}'
      {% endfor %}

      # 1Password CLI completions
      if command -v op &>/dev/null; then
        eval "$(op completion zsh 2>/dev/null)"
      fi
    create: true
    mode: "0644"
