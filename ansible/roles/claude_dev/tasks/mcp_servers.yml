---
# claude_dev/tasks/mcp_servers.yml
#
# MCP wrapper scripts and settings.json are now version-controlled in the repo
# under claude/mcp-wrappers/ and claude/settings.json, and symlinked into
# ~/.claude/ by the dotfiles role.
#
# This task file asserts those symlinks are in place so claude_dev fails
# loudly if dotfiles hasn't run yet.

- name: Check that ~/.claude/mcp-wrappers is symlinked
  ansible.builtin.stat:
    path: "{{ claude_dev_wrapper_dir }}"
    follow: false
  register: _mcp_wrappers_stat

- name: Warn if mcp-wrappers is not a symlink
  ansible.builtin.debug:
    msg: >-
      WARNING: {{ claude_dev_wrapper_dir }} is not a symlink to the dotfiles repo.
      Run the dotfiles role to set it up.
  when: not _mcp_wrappers_stat.stat.islnk

- name: Check that ~/.claude/settings.json is symlinked
  ansible.builtin.stat:
    path: "{{ claude_dev_config_dir }}/settings.json"
    follow: false
  register: _settings_stat

- name: Warn if settings.json is not a symlink
  ansible.builtin.debug:
    msg: >-
      WARNING: {{ claude_dev_config_dir }}/settings.json is not a symlink to the dotfiles repo.
      Run the dotfiles role to set it up.
  when: not _settings_stat.stat.islnk
