---
argument_specs:
  main:
    options:
      nextdns_resolver_profile_id:
        type: str
        required: false
        default: e112b1
        description: NextDNS profile ID to pin this device to.
      nextdns_resolver_servers:
        type: list
        elements: str
        required: false
        description: DNS-over-TLS server#hostname entries for systemd-resolved.
      nextdns_resolver_dns_over_tls:
        type: bool
        required: false
        default: true
        description: Whether to require DNS-over-TLS for the NextDNS servers.
      nextdns_resolver_dropin_path:
        type: str
        required: false
        default: /etc/systemd/resolved.conf.d/nextdns.conf
        description: Path of the systemd-resolved drop-in file to write.
