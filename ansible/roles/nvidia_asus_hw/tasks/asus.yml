---
# Official asus-linux Fedora guide: https://asus-linux.org/guides/fedora-guide/
# Uses the Terra repo (Fyra Labs). The community lukenukem COPR is deprecated
# and must not be used.
- name: Enable the Terra repository (bootstraps terra-release)
  become: true
  ansible.builtin.command:
    cmd: >-
      dnf install -y --nogpgcheck
      --repofrompath 'terra,{{ nvidia_asus_hw_terra_release_url }}'
      terra-release
    creates: /etc/yum.repos.d/terra.repo

- name: Install ASUS ROG tooling (asusctl, GUI, supergfxctl)
  become: true
  ansible.builtin.dnf:
    name: "{{ nvidia_asus_hw_asus_packages }}"
    state: present

# Restore the captured config before first start so asusd reads it on boot.
- name: Ensure /etc/asusd exists
  become: true
  ansible.builtin.file:
    path: /etc/asusd
    state: directory
    mode: "0755"
  when: nvidia_asus_hw_restore_asusd_config

- name: Restore captured asusd .ron config
  become: true
  ansible.builtin.copy:
    src: "asusd/{{ item }}"
    dest: "/etc/asusd/{{ item }}"
    mode: "0644"
  loop: "{{ nvidia_asus_hw_asusd_config_files }}"
  when: nvidia_asus_hw_restore_asusd_config
  notify: restart asusd

- name: Enable asusd
  become: true
  ansible.builtin.systemd_service:
    name: asusd
    enabled: true
    state: started
  when: nvidia_asus_hw_enable_asusctl

- name: Enable supergfxd
  become: true
  ansible.builtin.systemd_service:
    name: supergfxd
    enabled: true
    state: started
  when: nvidia_asus_hw_enable_supergfxctl
