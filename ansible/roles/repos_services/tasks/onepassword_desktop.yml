---
# Official 1Password Linux RPM instructions:
# https://support.1password.com/install-linux/  (Fedora / RHEL section)
- name: Import 1Password RPM GPG key
  become: true
  ansible.builtin.rpm_key:
    state: present
    key: https://downloads.1password.com/linux/keys/1password.asc

- name: Configure 1Password stable repository
  become: true
  ansible.builtin.yum_repository:
    name: 1password
    description: 1Password Stable Channel
    baseurl: https://downloads.1password.com/linux/rpm/stable/$basearch
    enabled: true
    gpgcheck: true
    repo_gpgcheck: true
    gpgkey: https://downloads.1password.com/linux/keys/1password.asc
    state: present

- name: Install 1Password desktop app
  become: true
  ansible.builtin.dnf:
    name: 1password
    state: present
    update_cache: true
