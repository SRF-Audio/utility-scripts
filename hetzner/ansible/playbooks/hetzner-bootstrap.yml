---
# Bootstrap playbook for the Hetzner single-node k3s cluster.
# Run via (from hetzner/ansible/): ansible-playbook -i inventory/hetzner.yml site.yml
#
# Pre-requisites:
# - Hetzner CAX31 server is provisioned and accessible via SSH (run hetzner-provision.yml first,
#   or ensure inventory/hetzner.yml has the real IP)
# - 500 GB block volume is attached to the server
# - 1Password CLI is configured on the control machine
#
# What this playbook does:
# 1.  (hetzner_node) Format + mount the Hetzner block volume
# 2.  (hetzner_node) Harden SSH: key-only auth, drop-in sshd config
# 3.  (hetzner_node) Install Tailscale and join the tailnet
# 4.  (hetzner_node) Install k3s single-node with local-path storage on the volume
# 5.  (local)        Retrieve + merge kubeconfig (context: "hetzner")
# 6.  (local)        Install ArgoCD (no dex config from the role — overridden below)
# 7.  (local)        Apply argocd-cmd-params-cm + ingress + hetzner-infra AppProject
# 8.  (local)        Deploy 1Password Operator
# 9.  (local)        Apply OnePasswordItem for argocd-github-oauth, wait for Secret
# 10. (local)        Apply argocd-cm (with dex GitHub connector) + argocd-rbac-cm
# 11. (local)        Restart argocd-dex-server + argocd-server to load OAuth config
# 12. (local)        Register GitHub repo with ArgoCD
# 13. (local)        Apply hetzner/argocd/root.yml — ArgoCD syncs all apps via waves

- name: Prepare Hetzner node — harden, mount volume, install Tailscale and k3s
  hosts: hetzner
  gather_facts: true
  become: true

  vars:
    hetzner_volume_id: >-
      {{ hostvars['localhost']['hetzner_provision_artifacts']['volume_id']
         | default('REPLACE_WITH_VOLUME_ID') }}
    hetzner_volume_device: "/dev/disk/by-id/scsi-0HC_Volume_{{ hetzner_volume_id }}"
    hetzner_volume_mount: /mnt/hetzner-volume
    hetzner_k3s_storage_path: /mnt/hetzner-volume/k3s-storage
    k3s_version: "v1.32.3+k3s1"

  roles:
    - role: hetzner_harden

    - role: hetzner_tailscale_setup
      vars:
        hetzner_tailscale_setup_auth_key: >-
          {{ lookup('community.general.onepassword',
                    'Tailscale',
                    field='hetzner_nodes',
                    vault='HomeLab') }}
        hetzner_tailscale_setup_hostname: hetzner-node
        hetzner_tailscale_setup_advertise_tags:
          - tag:k8s
          - tag:server-apps
        hetzner_tailscale_setup_extra_flags:
          - --advertise-exit-node

  tasks:
    - name: Check if volume is already formatted
      ansible.builtin.command: /usr/sbin/blkid {{ hetzner_volume_device }}
      register: hetzner_bootstrap_blkid
      changed_when: false
      failed_when: false

    - name: Format volume as ext4 (first-time only)
      ansible.builtin.command: /usr/sbin/mkfs.ext4 {{ hetzner_volume_device }}
      when: hetzner_bootstrap_blkid.rc != 0
      changed_when: true

    - name: Create mount point {{ hetzner_volume_mount }}
      ansible.builtin.file:
        path: "{{ hetzner_volume_mount }}"
        state: directory
        mode: "0755"

    - name: Mount Hetzner volume at {{ hetzner_volume_mount }}
      ansible.posix.mount:
        path: "{{ hetzner_volume_mount }}"
        src: "{{ hetzner_volume_device }}"
        fstype: ext4
        opts: defaults,nofail
        state: mounted

    - name: Create k3s storage directory on volume
      ansible.builtin.file:
        path: "{{ hetzner_k3s_storage_path }}"
        state: directory
        mode: "0755"

    - name: Get Tailscale IP for k3s TLS SAN
      ansible.builtin.command: tailscale ip -4
      register: _k3s_tailscale_ip
      changed_when: false

    - name: Install k3s single-node {{ k3s_version }}
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          curl -sfL https://get.k3s.io | \
            INSTALL_K3S_VERSION="{{ k3s_version }}" \
            sh -s - server \
              --disable traefik \
              --disable servicelb \
              --default-local-storage-path {{ hetzner_k3s_storage_path }} \
              --tls-san {{ _k3s_tailscale_ip.stdout | trim }}
        executable: /bin/bash
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      ansible.builtin.command: k3s kubectl get nodes
      register: hetzner_bootstrap_k3s_ready
      until: hetzner_bootstrap_k3s_ready.rc == 0
      retries: 30
      delay: 5
      changed_when: false

    - name: Restrict SSH firewall rule to Tailscale CIDR
      hetzner.hcloud.firewall:
        api_token: >-
          {{ lookup('community.general.onepassword',
                    'Hetzner',
                    field='api_token',
                    vault='HomeLab') }}
        name: "{{ hetzner_provision_firewall_name | default('hetzner-node-fw') }}"
        rules:
          - description: Allow SSH from Tailscale only
            direction: in
            protocol: tcp
            port: "22"
            source_ips:
              - 100.64.0.0/10
          - description: Allow Tailscale
            direction: in
            protocol: udp
            port: "41641"
            source_ips:
              - 0.0.0.0/0
              - ::/0
        state: present
      no_log: true
      become: false
      delegate_to: localhost

    - name: Fetch kubeconfig from Hetzner node
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ lookup('env', 'HOME') }}/.kube/hetzner-k3s.yaml"
        flat: true

    - name: Restrict kubeconfig permissions
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.kube/hetzner-k3s.yaml"
        mode: "0600"
      become: false
      delegate_to: localhost

- name: Deploy ArgoCD stack on Hetzner cluster
  hosts: local
  gather_facts: true

  vars:
    hetzner_kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/hetzner-k3s.yaml"
    hetzner_context: hetzner
    hetzner_cluster_name: hetzner
    hetzner_api_server: "https://{{ hetzner_tailscale_ip }}:6443"
    # hetzner_tailscale_ip is set via set_fact in pre_tasks below (delegate to hetzner_node).
    # k3s_cluster_domain and k3s_cluster_name must be play-level vars: k8s_object_manager calls
    # k8s_validator internally on every invocation, and both variables are required by that role.
    k3s_cluster_domain: "{{ hetzner_tailscale_ip }}"
    k3s_cluster_name: "{{ hetzner_cluster_name }}"
    artifacts_path: "{{ playbook_dir }}/.artifacts"

  pre_tasks:
    - name: Get Tailscale IPv4 from hetzner_node
      ansible.builtin.command: tailscale ip -4
      delegate_to: hetzner_node
      become: false
      register: _hetzner_tailscale_ip
      changed_when: false

    - name: Set hetzner_tailscale_ip fact
      ansible.builtin.set_fact:
        hetzner_tailscale_ip: "{{ _hetzner_tailscale_ip.stdout | trim }}"

    - name: Write hetzner-node SSH config entry
      ansible.builtin.blockinfile:
        path: "{{ lookup('env', 'HOME') }}/.ssh/config"
        marker: "# {mark} ANSIBLE MANAGED — hetzner-node"
        block: |
          Host hetzner-node
              HostName {{ hetzner_tailscale_ip }}
              User root
              IdentityFile ~/.ssh/coachlight-homelab.pem
              IdentitiesOnly yes
              StrictHostKeyChecking accept-new
        create: true
        mode: "0600"

    - name: Update kubeconfig server URL to Tailscale IP {{ hetzner_tailscale_ip }}
      ansible.builtin.replace:
        path: "{{ hetzner_kubeconfig }}"
        regexp: "https://127\\.0\\.0\\.1:6443"
        replace: "{{ hetzner_api_server }}"

    - name: Import kubeconfig_manager role
      ansible.builtin.import_role:
        name: kubeconfig_manager
      vars:
        kubeconfig_manager_source_kubeconfig_path: "{{ hetzner_kubeconfig }}"
        kubeconfig_manager_cluster_name: "{{ hetzner_cluster_name }}"
        kubeconfig_manager_cluster_server: "{{ hetzner_api_server }}"
        kubeconfig_manager_context_name: "{{ hetzner_context }}"
        kubeconfig_manager_context_user: default

    - name: Save Hetzner kubeconfig to 1Password (create if missing)
      ansible.builtin.include_role:
        name: op_item_create
      vars:
        op_item_create_vault_name: HomeLab
        op_item_create_artifacts_path: "{{ artifacts_path }}"
        op_item_create_op_service_account_token: >-
          {{ lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') }}
        op_item_create_items:
          - name: Hetzner k3s Kubeconfig
            category: server
            tags:
              - ansible_managed
              - hetzner
            fields:
              kubeconfig[concealed]: "{{ lookup('file', hetzner_kubeconfig) }}"
      no_log: true

    - name: Update Hetzner kubeconfig in 1Password (edit if already exists)
      ansible.builtin.include_role:
        name: op_item_edit
      when: op_item_create_existing_items | default([]) | length > 0
      vars:
        op_item_edit_vault_name: HomeLab
        op_item_edit_artifacts_path: "{{ artifacts_path }}"
        op_item_edit_op_service_account_token: >-
          {{ lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') }}
        op_item_edit_items:
          - name: Hetzner k3s Kubeconfig
            fields:
              kubeconfig[concealed]: "{{ lookup('file', hetzner_kubeconfig) }}"
      no_log: true

    - name: Import k8s_validator role
      ansible.builtin.import_role:
        name: k8s_validator
      vars:
        k8s_validator_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        k8s_validator_context: >-
          {{ kubeconfig_manager_artifacts.context_name }}
        # localhost (control machine) already has Python3 — skip OS package installs
        # that would require passwordless sudo.
        k8s_validator_install_packages: false

  tasks:
    - name: Install ArgoCD via argocd_deploy role
      ansible.builtin.include_role:
        name: argocd_deploy
      vars:
        argocd_deploy_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        argocd_deploy_context: >-
          {{ kubeconfig_manager_artifacts.context_name }}
        argocd_deploy_cluster_name: "{{ hetzner_cluster_name }}"
        argocd_deploy_configure_dex: false

    # cmd-params-cm sets server.insecure: true; ingress depends on that.
    # Both can be applied before argocd-cm — they don't reference any OAuth state.
    - name: Apply argocd-cmd-params-cm
      ansible.builtin.include_role:
        name: k8s_object_manager
      vars:
        k8s_object_manager_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        k8s_object_manager_context: >-
          {{ kubeconfig_manager_artifacts.context_name }}
        k8s_object_manager_src: "{{ playbook_dir }}/../../../hetzner/k8s/argocd/argocd-cmd-params-cm.yml"
        k8s_object_manager_state: present
        k8s_object_manager_apply: true

    - name: Apply ArgoCD Tailscale ingress
      ansible.builtin.include_role:
        name: k8s_object_manager
      vars:
        k8s_object_manager_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        k8s_object_manager_context: >-
          {{ kubeconfig_manager_artifacts.context_name }}
        k8s_object_manager_src: "{{ playbook_dir }}/../../../hetzner/k8s/argocd/ingress.yml"
        k8s_object_manager_state: present
        k8s_object_manager_apply: true

    # Apply hetzner-infra AppProject directly so onepassword_operator_deploy can create
    # its ArgoCD Application. The 1Password Operator Application uses a PUBLIC Helm repo
    # (https://1password.github.io/connect-helm-charts/), NOT the private GitHub repo —
    # so it only needs the hetzner-infra project to exist, not GitHub SSH credentials.
    - name: Apply hetzner-infra AppProject
      ansible.builtin.include_role:
        name: k8s_object_manager
      vars:
        k8s_object_manager_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        k8s_object_manager_context: >-
          {{ kubeconfig_manager_artifacts.context_name }}
        k8s_object_manager_src: >-
          {{ playbook_dir }}/../../../hetzner/argocd/apps/projects/hetzner-infra-project.yml
        k8s_object_manager_state: present
        k8s_object_manager_apply: true

    # Deploy 1Password Operator via ArgoCD Application (public Helm repo — syncs immediately).
    # Waits up to 5 min for onepassword-connect and onepassword-connect-operator to be Available.
    # After this completes, the OnePasswordItem CRD exists and argocd_github_repo_create
    # can create OnePasswordItem resources.
    - name: Deploy 1Password Operator
      ansible.builtin.include_role:
        name: onepassword_operator_deploy
      vars:
        onepassword_operator_deploy_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        onepassword_operator_deploy_context: >-
          {{ kubeconfig_manager_artifacts.context_name }}
        onepassword_operator_deploy_cluster_name: "{{ hetzner_cluster_name }}"
        onepassword_operator_deploy_project: "hetzner-infra"
        onepassword_operator_deploy_connect_credentials: >-
          {{ lookup('community.general.onepassword_doc',
                    'Coachlight HomeLab Credentials File',
                    vault='HomeLab') }}
        onepassword_operator_deploy_operator_token: >-
          {{ lookup('community.general.onepassword',
                    'd3dschiayvvfyy2lgcksk6koyy',
                    field='credential',
                    vault='HomeLab') }}

    # Apply the OnePasswordItem that materializes argocd-github-oauth Secret.
    # Must run AFTER onepassword_operator_deploy (so the CRD exists) and BEFORE
    # argocd-cm (so dex sees the secret on first read of the new dex.config).
    - name: Apply argocd-github-oauth OnePasswordItem
      ansible.builtin.include_role:
        name: k8s_object_manager
      vars:
        k8s_object_manager_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        k8s_object_manager_context: >-
          {{ kubeconfig_manager_artifacts.context_name }}
        k8s_object_manager_src: >-
          {{ playbook_dir }}/../../../hetzner/k8s/argocd/onepassword-argocd-github-oauth.yml
        k8s_object_manager_state: present
        k8s_object_manager_apply: true

    - name: Wait for 1Password Operator to materialize argocd-github-oauth Secret
      kubernetes.core.k8s_info:
        kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        context: >-
          {{ kubeconfig_manager_artifacts.context_name }}
        api_version: v1
        kind: Secret
        namespace: argocd
        name: argocd-github-oauth
      register: _argocd_github_oauth_secret
      until:
        - _argocd_github_oauth_secret.resources is defined
        - _argocd_github_oauth_secret.resources | length > 0
        - _argocd_github_oauth_secret.resources[0].data is defined
        - (_argocd_github_oauth_secret.resources[0].data['argocd-hetzner-client-id'] | default('')) | length > 0
        - (_argocd_github_oauth_secret.resources[0].data['argocd-hetzner-client-secret'] | default('')) | length > 0
      retries: 30
      delay: 5
      failed_when: >-
        _argocd_github_oauth_secret.resources is not defined or
        _argocd_github_oauth_secret.resources | length == 0 or
        _argocd_github_oauth_secret.resources[0].data is not defined or
        (_argocd_github_oauth_secret.resources[0].data['argocd-hetzner-client-id'] | default('')) | length == 0 or
        (_argocd_github_oauth_secret.resources[0].data['argocd-hetzner-client-secret'] | default('')) | length == 0

    # Apply argocd-cm WITH dex.config now that the referenced secret exists.
    - name: Apply argocd-cm with dex GitHub connector
      ansible.builtin.include_role:
        name: k8s_object_manager
      vars:
        k8s_object_manager_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        k8s_object_manager_context: >-
          {{ kubeconfig_manager_artifacts.context_name }}
        k8s_object_manager_src: "{{ playbook_dir }}/../../../hetzner/k8s/argocd/argocd-cm.yml"
        k8s_object_manager_state: present
        k8s_object_manager_apply: true

    - name: Apply argocd-rbac-cm (homepage readonly, GitHub UID 16975040 admin)
      ansible.builtin.include_role:
        name: k8s_object_manager
      vars:
        k8s_object_manager_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        k8s_object_manager_context: >-
          {{ kubeconfig_manager_artifacts.context_name }}
        k8s_object_manager_src: "{{ playbook_dir }}/../../../hetzner/k8s/argocd/argocd-rbac-cm.yml"
        k8s_object_manager_state: present
        k8s_object_manager_apply: true

    # ArgoCD's argocd-server watches argocd-cm and reloads dex automatically,
    # but external secret refs ($argocd-github-oauth:*) are resolved only when
    # dex (re)starts. On fresh installs dex came up before the new cm — bounce
    # both so the GitHub connector is loaded with the correct secret values.
    - name: Restart argocd-dex-server to pick up GitHub connector
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
          --context={{ kubeconfig_manager_artifacts.context_name }}
          -n argocd rollout restart deployment/argocd-dex-server
      changed_when: true

    - name: Restart argocd-server to pick up new url + RBAC
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
          --context={{ kubeconfig_manager_artifacts.context_name }}
          -n argocd rollout restart deployment/argocd-server
      changed_when: true

    # Register GitHub repo with ArgoCD. The 1Password Operator is running, so
    # this role's OnePasswordItem for the SSH deploy key will materialize.
    - name: Register GitHub repo with ArgoCD
      ansible.builtin.include_role:
        name: argocd_github_repo_create
      vars:
        argocd_github_repo_create_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        argocd_github_repo_create_context: >-
          {{ kubeconfig_manager_artifacts.context_name }}

    # Apply root ArgoCD Application. The GitHub SSH repo is now registered, so ArgoCD
    # can sync all apps in hetzner/argocd/apps/ (projects, operators, platform, apps).
    - name: Apply root ArgoCD Application
      ansible.builtin.include_role:
        name: k8s_object_manager
      vars:
        k8s_object_manager_kubeconfig: >-
          {{ kubeconfig_manager_artifacts.target_kubeconfig_path }}
        k8s_object_manager_context: >-
          {{ kubeconfig_manager_artifacts.context_name }}
        k8s_object_manager_src: "{{ playbook_dir }}/../../../hetzner/argocd/root.yml"
        k8s_object_manager_state: present
        k8s_object_manager_apply: true

    - name: Install k9s
      ansible.builtin.include_role:
        name: k9s_install
