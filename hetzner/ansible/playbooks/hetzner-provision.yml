---
# Provision Hetzner Cloud infrastructure from scratch.
# Run via (from hetzner/ansible/): ansible-playbook -i inventory/hetzner.yml site.yml
# Or standalone:  ansible-playbook -i inventory/hetzner.yml playbooks/hetzner-provision.yml
#
# What this playbook does:
#   1. Uploads SSH public key to Hetzner Cloud
#   2. Creates Cloud Firewall: inbound TCP 22 + UDP 41641 only (all else blocked)
#   3. Creates CAX31 server (ARM64, 16 vCPU, 32 GB) with Fedora 41
#   4. Creates 500 GB block volume and attaches to server
#   5. Adds hetzner_node to in-memory inventory with real IP
#   6. Updates inventory/hetzner.yml with real server IP
#   7. Waits for SSH to become available

- name: Provision Hetzner Cloud server and volume
  hosts: local
  gather_facts: true

  roles:
    - role: hetzner_provision
      vars:
        hetzner_provision_api_token: >-
          {{ lookup('community.general.onepassword',
                    'Hetzner',
                    field='api_token',
                    vault='HomeLab') }}
        hetzner_provision_ssh_key_name: hetzner-bootstrap
        hetzner_provision_ssh_public_key: >-
          {{ lookup('community.general.onepassword',
                    'coachlight-homelab SSH key',
                    field='public_key',
                    vault='HomeLab') }}
        hetzner_provision_inventory_path: >-
          {{ playbook_dir }}/../inventory/hetzner.yml
