---
# Hetzner bootstrap entry point — zero to hero.
# Usage (run from hetzner/ansible/): ansible-playbook -i inventory/hetzner.yml site.yml
#
# Required 1Password items (HomeLab vault):
#   "Hetzner"                    — field "api_token"     (Hetzner Cloud API token)          ← NEW
#   "Tailscale"                  — field "hetzner_nodes" (reusable auth key, tag:k8s + tag:server-apps) ← NEW field
#   "coachlight-homelab SSH key" — field "public_key"    (existing homelab item)
#   "Coachlight HomeLab Credentials File" — (existing 1Password Connect credentials doc)
#   "HomeLab ArgoCD Deploy Key"  — field "private key"   (existing homelab item)
#   d3dschiayvvfyy2lgcksk6koyy   — field "credential"   (existing 1Password Operator token)
#
# Note: GitHub OAuth (argocd-client-id, argocd-client-secret) is NOT needed — OAuth is
#       disabled on Hetzner ArgoCD (admin password only, Tailscale-only access).
#
# SSH connections use ~/.ssh/coachlight-homelab.pem (same as homelab).

- name: Provision Hetzner Cloud infrastructure
  import_playbook: playbooks/hetzner-provision.yml
  tags: provision

- name: Bootstrap Hetzner k3s and ArgoCD stack
  import_playbook: playbooks/hetzner-bootstrap.yml
  tags: bootstrap
