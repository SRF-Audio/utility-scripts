---
argument_specs:
  main:
    options:
      hetzner_tailscale_setup_auth_key:
        type: str
        required: true
        description: Tailscale auth key to bring the node online. Must be no_log.
      hetzner_tailscale_setup_hostname:
        type: str
        required: false
        description: >-
          Tailscale hostname for this node. Defaults to inventory_hostname.
      hetzner_tailscale_setup_advertise_tags:
        type: list
        elements: str
        required: false
        description: Tailscale tags to advertise (e.g. tag:k8s).
      hetzner_tailscale_setup_ssh_enabled:
        type: bool
        required: false
        description: Whether to enable Tailscale SSH (--ssh flag).
      hetzner_tailscale_setup_extra_flags:
        type: list
        elements: str
        required: false
        description: Extra raw flags appended to the tailscale up command.
      hetzner_tailscale_setup_artifacts_path:
        type: str
        required: false
        description: Base path for artifacts output, used by role_artifacts.
