---
argument_specs:
  main:
    options:
      hetzner_provision_api_token:
        type: str
        required: true
        description: Hetzner Cloud API token.
      hetzner_provision_ssh_key_name:
        type: str
        required: true
        description: Name for the SSH key resource in Hetzner Cloud.
      hetzner_provision_ssh_public_key:
        type: str
        required: true
        description: SSH public key content to upload to Hetzner Cloud.
      hetzner_provision_server_name:
        type: str
        required: false
        description: Name of the Hetzner Cloud server.
      hetzner_provision_server_type:
        type: str
        required: false
        description: Hetzner Cloud server type (e.g. cax31).
      hetzner_provision_image:
        type: str
        required: false
        description: Hetzner Cloud OS image (e.g. ubuntu-24.04).
      hetzner_provision_location:
        type: str
        required: false
        description: Hetzner Cloud datacenter location (e.g. nbg1).
      hetzner_provision_firewall_name:
        type: str
        required: false
        description: Name for the Hetzner Cloud Firewall resource.
      hetzner_provision_volume_name:
        type: str
        required: false
        description: Name of the Hetzner Cloud block volume.
      hetzner_provision_volume_size_gb:
        type: int
        required: false
        description: Size of the block volume in GB.
      hetzner_provision_ssh_private_key_file:
        type: str
        required: false
        description: >-
          Local path to the SSH private key used for Ansible connections after
          provisioning. Defaults to ~/.ssh/coachlight-homelab.pem (same as
          homelab).
      hetzner_provision_inventory_path:
        type: str
        required: true
        description: >-
          Absolute path to the Ansible inventory file to update with the
          provisioned server IP.
      hetzner_provision_artifacts_path:
        type: str
        required: false
        description: Base path for artifacts output, used by role_artifacts.
