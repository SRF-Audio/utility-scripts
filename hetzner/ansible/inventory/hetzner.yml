---
# Hetzner Cloud inventory.
# ansible_host is updated automatically by hetzner_provision role on first run.
# ansible_ssh_private_key_file points to the key written from 1Password by site.yml.
all:
  children:
    hetzner:
      hosts:
        hetzner_node:
          ansible_host: 178.104.100.13
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/coachlight-homelab.pem
          ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes -o IdentityAgent=~/.1password/agent.sock"

    local:
      hosts:
        localhost:
          ansible_connection: local
