---
# Reuses k8s/paperless_ngx_secrets/ verbatim — same HomeLab 1Password vault items.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paperless-ngx-app-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: hetzner-apps
  source:
    repoURL: https://github.com/SRF-Audio/utility-scripts
    targetRevision: main
    path: k8s/paperless_ngx_secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: apps-paperless-ngx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
