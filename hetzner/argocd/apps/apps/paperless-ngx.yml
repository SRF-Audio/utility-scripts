---
# Paperless-NGX on Hetzner.
# Points to hetzner/k8s/paperless_ngx which has Hetzner-specific PVCs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paperless-ngx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: hetzner-apps
  source:
    repoURL: https://github.com/SRF-Audio/utility-scripts
    targetRevision: main
    path: hetzner/k8s/paperless_ngx
  destination:
    server: https://kubernetes.default.svc
    namespace: apps-paperless-ngx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
