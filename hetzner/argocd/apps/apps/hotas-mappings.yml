---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hotas-mappings
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: hetzner-apps
  source:
    repoURL: https://github.com/SRF-Audio/utility-scripts
    targetRevision: main
    path: hetzner/k8s/hotas_mappings
  destination:
    server: https://kubernetes.default.svc
    namespace: apps-hotas-mappings
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
