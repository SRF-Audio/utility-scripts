---
# Deploys the NetBox 1Password secret into db-netbox so netbox-postgres
# (Bitnami chart) can reference existingSecret: netbox for db-password.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netbox-postgres-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: hetzner-db
  source:
    repoURL: https://github.com/SRF-Audio/utility-scripts
    targetRevision: main
    path: hetzner/k8s/netbox-db-secret
  destination:
    server: https://kubernetes.default.svc
    namespace: db-netbox
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
