---
# Deploys a single 1Password-backed Secret containing all NetBox credentials.
# Requires a "NetBox" item in the HomeLab vault — see hetzner/k8s/netbox/onepassword-netbox.yml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netbox-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: hetzner-infra
  source:
    repoURL: https://github.com/SRF-Audio/utility-scripts
    targetRevision: main
    path: hetzner/k8s/netbox
  destination:
    server: https://kubernetes.default.svc
    namespace: infra-netbox
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
