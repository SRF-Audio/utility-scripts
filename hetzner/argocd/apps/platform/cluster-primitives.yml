---
# Points to the Hetzner-specific cluster primitives (local-path only, no NFS).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-primitives
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: hetzner-infra
  source:
    repoURL: https://github.com/SRF-Audio/utility-scripts
    targetRevision: main
    path: hetzner/k8s/cluster_primitives
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
