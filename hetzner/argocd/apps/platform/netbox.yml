---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netbox
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: hetzner-infra
  source:
    repoURL: https://netbox-community.github.io/netbox-chart
    chart: netbox
    targetRevision: "5.0.0-beta.145"
    helm:
      valuesObject:
        superuser:
          existingSecret: netbox

        existingSecret: netbox

        persistence:
          enabled: true
          storageClass: local-path-retain

        # Use existing PostgreSQL instance
        postgresql:
          enabled: false

        # Use existing Redis instance
        redis:
          enabled: false

        # External database configuration
        externalDatabase:
          host: netbox-postgres-postgresql.db-netbox.svc.cluster.local
          port: 5432
          database: netbox
          username: netbox
          existingSecretName: netbox
          existingSecretKey: db-password

        # External Redis configuration
        tasksRedis:
          host: redis-master.db-redis.svc.cluster.local
          port: 6379
          existingSecretName: netbox
          existingSecretKey: redis-password

        cachingRedis:
          host: redis-master.db-redis.svc.cluster.local
          port: 6379
          existingSecretName: netbox
          existingSecretKey: redis-password

        # Initial DB migration on a fresh schema takes >100s — extend startup probe
        startupProbe:
          failureThreshold: 30

        service:
          type: ClusterIP

        ingress:
          enabled: true
          className: tailscale
          hosts:
            - host: netbox-hetzner.rohu-shark.ts.net
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - netbox-hetzner.rohu-shark.ts.net
          annotations:
            tailscale.com/tags: "tag:k8s,tag:server-apps"
            app.kubernetes.io/managed-by: argocd
            gethomepage.dev/enabled: "true"
            gethomepage.dev/name: "NetBox"
            gethomepage.dev/description: "IPAM and datacenter infrastructure management"
            gethomepage.dev/group: "Platform"
            gethomepage.dev/icon: "netbox.png"
            gethomepage.dev/pod-selector: "app.kubernetes.io/name=netbox"
            gethomepage.dev/href: "https://netbox-hetzner.rohu-shark.ts.net"
            gethomepage.dev/url: "http://netbox.infra-netbox.svc.cluster.local:80"
            gethomepage.dev/siteMonitor: "http://netbox.infra-netbox.svc.cluster.local:80"

  destination:
    server: https://kubernetes.default.svc
    namespace: infra-netbox
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
