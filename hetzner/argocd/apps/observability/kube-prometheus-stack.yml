---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hetzner-kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: hetzner-observability
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "83.6.0"
    helm:
      valuesObject:
        # Use existing secret from 1Password operator rather than chart-generated
        grafana:
          admin:
            existingSecret: grafana-admin-credentials
            userKey: username
            passwordKey: password

          defaultDashboardsTimezone: browser

          persistence:
            enabled: true
            storageClassName: local-path-retain
            size: 5Gi

          ingress:
            enabled: true
            ingressClassName: tailscale
            hosts:
              - grafana-hetzner.rohu-shark.ts.net
            tls:
              - hosts:
                  - grafana-hetzner.rohu-shark.ts.net
            annotations:
              tailscale.com/tags: "tag:k8s,tag:server-apps"
              app.kubernetes.io/managed-by: argocd
              gethomepage.dev/enabled: "true"
              gethomepage.dev/name: "Grafana"
              gethomepage.dev/description: "Metrics and log dashboards"
              gethomepage.dev/group: "Observability"
              gethomepage.dev/icon: "grafana.png"
              gethomepage.dev/url: "https://grafana-hetzner.rohu-shark.ts.net"
              gethomepage.dev/ping: "http://hetzner-kube-prometheus-stack-grafana.observability-monitoring.svc.cluster.local:80"

          additionalDataSources:
            - name: Loki
              type: loki
              url: http://hetzner-loki.observability-loki.svc.cluster.local:3100
              access: proxy
              isDefault: false
              jsonData:
                maxLines: 1000

          grafana.ini:
            server:
              root_url: "https://grafana-hetzner.rohu-shark.ts.net"

        prometheus:
          prometheusSpec:
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path-retain
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 20Gi
            # Scrape all namespaces, not just those with prometheus label
            podMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false

        # Disable Alertmanager until alert routing is configured
        alertmanager:
          enabled: false

        # Single-node cluster — disable etcd/scheduler/controller-manager
        # scraping (control plane not exposed on k3s)
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeProxy:
          enabled: false
        kubeCoreDns:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: observability-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
