---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hetzner-alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "35"
spec:
  project: hetzner-observability
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: "1.7.0"
    helm:
      valuesObject:
        alloy:
          configMap:
            content: |-
              logging {
                level  = "info"
                format = "logfmt"
              }

              // Discover all pods across all namespaces
              discovery.kubernetes "pods" {
                role = "pod"
              }

              // Relabel to extract metadata and build log paths
              discovery.relabel "pods" {
                targets = discovery.kubernetes.pods.targets

                rule {
                  source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
                  target_label  = "__path__"
                  separator     = "/"
                  replacement   = "/var/log/pods/$1/*/*.log"
                }

                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  target_label  = "node"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                  target_label  = "app"
                }
              }

              // Tail pod logs and ship to Loki
              loki.source.kubernetes "pods" {
                targets    = discovery.relabel.pods.output
                forward_to = [loki.write.default.receiver]
              }

              loki.write "default" {
                endpoint {
                  url = "http://hetzner-loki.observability-loki.svc.cluster.local:3100/loki/api/v1/push"
                }
              }

              // Scrape Alloy's own metrics and forward to Prometheus
              prometheus.scrape "alloy_self" {
                targets = [{"__address__" = "127.0.0.1:12345"}]
                forward_to = [prometheus.remote_write.default.receiver]
              }

              prometheus.remote_write "default" {
                endpoint {
                  url = "http://hetzner-kube-prometheus-stack-prometheus.observability-monitoring.svc.cluster.local:9090/api/v1/write"
                }
              }

          mounts:
            varlog: true
            dockercontainers: false

          securityContext:
            privileged: false
            runAsUser: 0
            runAsGroup: 0

        controller:
          type: daemonset

        rbac:
          create: true

        serviceAccount:
          create: true

        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi

        ingress:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: observability-alloy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
