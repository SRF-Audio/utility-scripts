---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hetzner-loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  project: hetzner-observability
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: "6.55.0"
    helm:
      valuesObject:
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false

          commonConfig:
            replication_factor: 1

          storage:
            type: s3
            s3:
              endpoint: http://minio.observability-minio.svc.cluster.local:9000
              bucketNames:
                chunks: loki
                ruler: loki
                admin: loki
              region: us-east-1
              secretAccessKey: ""
              accessKeyId: loki
              s3ForcePathStyle: true
              insecure: true

          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

          limits_config:
            retention_period: 30d

        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: local-path-retain
            size: 10Gi

        # Disable components not needed in single-binary mode
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0

        # Disable bundled MinIO — we manage our own
        minio:
          enabled: false

        gateway:
          enabled: false

        lokiCanary:
          enabled: false

        test:
          enabled: false

        # Loki user for MinIO — password from existing minio-credentials secret
        extraEnv:
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: lokiSecretKey
                optional: false

  destination:
    server: https://kubernetes.default.svc
    namespace: observability-loki
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
