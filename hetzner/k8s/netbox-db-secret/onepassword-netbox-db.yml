---
# Mirrors the NetBox 1Password item into db-netbox so the Bitnami postgres
# chart can reference existingSecret: netbox for the db-password key.
# Field IDs: password, secret-key, db-password, redis-password.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: netbox
  namespace: db-netbox
spec:
  itemPath: "vaults/HomeLab/items/NetBox"
