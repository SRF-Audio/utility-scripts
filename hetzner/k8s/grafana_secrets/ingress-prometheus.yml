---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: observability-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/managed-by: argocd
  annotations:
    tailscale.com/tags: "tag:k8s,tag:server-apps"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Prometheus"
    gethomepage.dev/description: "Metrics collection and alerting"
    gethomepage.dev/group: "Observability"
    gethomepage.dev/icon: "prometheus.png"
    gethomepage.dev/url: "https://prometheus-hetzner.rohu-shark.ts.net"
    gethomepage.dev/ping: "http://hetzner-kube-prometheus-st-prometheus.observability-monitoring.svc.cluster.local:9090"
spec:
  ingressClassName: tailscale
  rules:
    - host: prometheus-hetzner.rohu-shark.ts.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hetzner-kube-prometheus-st-prometheus
                port:
                  number: 9090
  tls:
    - hosts:
        - prometheus-hetzner.rohu-shark.ts.net
