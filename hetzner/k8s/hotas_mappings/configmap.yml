        { "cap": "D", "joy": "Joy_24", "type": "common", "fn": "Reset 2-2-2", "cat": "power" }
      ],
      "pov": {
        "nw": "Chat",    "n": "UI Up",      "ne": "Systems",
        "w":  "UI Left", "ctr": "UI Select","e":  "UI Right",
        "sw": "Nav",     "s": "UI Down",    "se": "Contacts"
      },
      "switch_note": "Latching switch — exactly one position is held at all times. Each position acts as a modifier on rows 1–3 of the keypad.",
      "contexts": [
        {
          "title": "SRV Context",
          "subtitle": "no modifier — context-isolated from ship",
          "tables": [
            [
              ["Right Stick X",      "Joy_XAxis",  "Steering (Roll)"],
              ["Right Stick Y",      "Joy_YAxis",  "Pitch / turret aim"],
              ["Right Stick Twist",  "Joy_ZAxis",  "Turret Yaw"],
              ["Left Stick X",       "Joy_RXAxis", "Turret Pitch"],
              ["Left Stick Twist",   "Joy_RZAxis", "Throttle"],
              ["Right Stick Press",  "Joy_26",     "Primary Fire (turret)"],
              ["Left Stick Press",   "Joy_25",     "Secondary Fire"],
              ["Right Push (Boost)", "Joy_20",     "Vertical Thrust (jump)"],
              ["Left Push",          "Joy_1",      "UI Focus"],
              ["Top-L Left",         "Joy_2",      "Full Stop"],
              ["Top-L Right",        "Joy_8",      "Full Forward"]
            ],
            [
              ["Top-R Left",    "Joy_13",          "Drive Assist Toggle"],
              ["Top-R Mid",     "Joy_14",          "Handbrake"],
              ["Top-R Right",   "Joy_19",          "Recall / Dismiss Ship"],
              ["Keypad 1",      "Joy_3",           "Headlights"],
              ["Keypad 2",      "Joy_4",           "Toggle Turret"],
              ["Keypad 3 / A",  "Joy_5 / Joy_6",   "Fire Group ◄ / ►"],
              ["Keypad 4 / 5",  "Joy_9 / Joy_10",  "Galaxy / System Map"],
              ["Keypad 6",      "Joy_11",          "Select Target"],
              ["Keypad B",      "Joy_12",          "Reverse Throttle Toggle"],
              ["Keypad 7",      "Joy_15",          "Photo Cam"],
              ["Keypad 8",      "Joy_16",          "Cargo Scoop (materials)"]
            ]
          ],
          "footer": "Sticks mirror flight: right stick = aim/steer, left stick twist = throttle, boost button = jump. POV hat cardinals = UI nav, diagonals = panel focus (same as ship). Bottom-row power-pip bindings shared with ship context."
        },
        {
          "title": "On-Foot / Humanoid Context",
          "subtitle": "no modifier — Odyssey FPS layout",
          "tables": [
            [
              ["Right Stick X",    "Joy_XAxis",  "Look Yaw"],
              ["Right Stick Y",    "Joy_YAxis",  "Look Pitch"],
              ["Left Stick X",     "Joy_RXAxis", "Strafe"],
              ["Left Stick Y",     "Joy_RYAxis", "Move Forward/Back"],
              ["Right Stick Press","Joy_26",     "Primary Fire"],
              ["Left Stick Press", "Joy_25",     "Aim / Zoom"],
              ["Right Push",       "Joy_20",     "Jump"],
              ["Left Push",        "Joy_1",      "Crouch"],
              ["Top-L Left",       "Joy_2",      "Reload"],
              ["Top-L Mid",        "Joy_7",      "Melee"],
              ["Top-L Right",      "Joy_8",      "Primary Interact"],
              ["Top-R Left",       "Joy_13",     "Sprint"],
              ["Top-R Mid",        "Joy_14",     "Walk (quiet)"],
              ["Top-R Right",      "Joy_19",     "Secondary Interact"]
            ],
            [
              ["POV ↖",           "Up+Left combo",    "Emote Wheel"],
              ["POV ↗",           "Up+Right combo",   "Ping"],
              ["POV ↙",           "Down+Left combo",  "Flashlight"],
              ["POV ↘",           "Down+Right combo", "Night Vision"],
              ["POV Press",            "Joy_32",           "Item Wheel"],
              ["Keypad 1 / 2",         "Joy_3 / Joy_4",   "Primary / Secondary Weapon"],
              ["Keypad 3",             "Joy_5",            "Hide / Holster"],
              ["Keypad A",             "Joy_6",            "Next Weapon"],
              ["Keypad 4 / 5",         "Joy_9 / Joy_10",  "Galaxy / System Map"],
              ["Keypad 6 / B",         "Joy_11 / Joy_12", "Mission Help / Tool Mode"],
              ["Keypad 7 / 8 / 9",     "Joy_15 / 16 / 17","Suit / Comp Analyser / Recharge tool"],
              ["Keypad C",             "Joy_18",           "Next Grenade Type"],
              ["Keypad *",             "Joy_21",           "Battery"],
              ["Keypad 0 / # / D",     "Joy_22 / 23 / 24","Throw Grenade / Health Pack / Hack Terminal"]
            ]
          ]
        }
      ],
      "notes": [
        "<strong>How to read mode-multiplexed keys:</strong> keypad rows 1&ndash;3 show four lines per key, one per mode. The colored letter (T / E / M / C) is the active slide-switch position. Slide to that position, then press the key.",
        "<strong>Slide switch is always-on:</strong> exactly one of Joy_27&ndash;30 is held at any moment. Sliding between positions briefly releases one and engages the next &mdash; no mode-multiplexed action has a plain (no-modifier) binding, so a slide-gap is harmless.",
        "<strong>Common bindings (active in all modes):</strong> all stick axes, both stick presses, top row, push buttons, POV hat (cardinals + diagonals), and keypad bottom row.",
        "<strong>POV hat diagonals = direct cockpit panel focus:</strong> &#8598; Chat, &#8599; Systems, &#8601; Nav, &#8600; Contacts. Mnemonic: &#8598;/&#8601; = left-side panels (Chat top-left, Nav left); &#8599;/&#8600; = right-side panels (Systems top-right, Contacts bottom-right).",
        "<strong>HeadLookToggle:</strong> Key 7 in Travel mode (modal) and Left Push (Joy_1) always-on. Off Joy_32 (hat press) &mdash; that button was firing HeadLook on every UI Select at stations. UIFocus is unbound on stick (POV diagonals direct-focus panels, making it redundant).",
