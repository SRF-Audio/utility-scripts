---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hotas-mappings-html
  namespace: apps-hotas-mappings
  labels:
    app.kubernetes.io/name: hotas-mappings
    app.kubernetes.io/component: webserver
    app.kubernetes.io/managed-by: argocd
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Controls</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&display=swap');

    /* ============================================================
       Unified document base (kept from VKB view; Boopidoo styles
       are namespaced under .boopidoo-view so they don't touch
       the document <body>).
       ============================================================ */
    :root {
      --bg: #1a1a1a;
      --fg: #eaeaea;
      --accent: #ff4d3d;
      --label-bg: rgba(255,255,255,0.92);
      --label-fg: #111;
      --empty-bg: rgba(120,120,120,0.25);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--fg);
      font-family: 'Barlow', ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    /* ============================================================
       Unified sticky header (Boopidoo dark theme)
       ============================================================ */
    .app-header {
      display: flex; align-items: center; gap: 1.5rem;
      padding: 0.5rem 1rem;
      background: #0e0e0e;
      border-bottom: 1px solid #333;
      position: sticky; top: 0; z-index: 100;
    }
    .app-header .brand {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: #f59e0b;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    .app-header nav {
      display: flex; gap: 0.25rem;
    }
    .app-header .nav-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #aaa;
      text-decoration: none;
      padding: 0.4rem 0.8rem;
      border-bottom: 2px solid transparent;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .app-header .nav-link:hover { color: #eaeaea; }
    .app-header .nav-link.active {
      color: #f59e0b;
      border-bottom-color: #f59e0b;
    }

    /* ============================================================
       VKB section styles (preserved from original VKB index.html)
       ============================================================ */
    .vkb-toolbar {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.5rem 1rem;
      background: #0e0e0e;
      border-bottom: 1px solid #333;
    }
    .vkb-toolbar h2 { font-size: 1rem; margin: 0; font-weight: 600; }
    .vkb-toolbar .meta { font-size: 0.85rem; color: #aaa; }
    .vkb-toolbar select, .vkb-toolbar button {
      background: #222; color: var(--fg); border: 1px solid #444;
      padding: 0.25rem 0.5rem; border-radius: 4px; font: inherit;
    }
    .vkb-toolbar button:hover { background: #2a2a2a; cursor: pointer; }

    .stage {
      /* The diagram preserves its aspect ratio. 792:612 = 1.294 */
      position: relative; margin: 0 auto;
      width: min(100vw, calc((100vh - 100px) * 1.2941));
      aspect-ratio: 792 / 612;
      background-size: 100% 100%;
      background-repeat: no-repeat;
      container-type: inline-size;
    }

    .label {
      position: absolute;
      background: var(--label-bg);
      color: var(--label-fg);
      display: flex; align-items: center; justify-content: flex-start;
      padding: 0 0.4em;
      font-size: clamp(8px, 1.1cqw, 13px);
      line-height: 1;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      border-radius: 1px;
    }
    .label.empty { background: var(--empty-bg); color: transparent; }
    .label.modifier { background: #ffe7c2; font-weight: 600; }
    .label.section { background: #c8e4ff; font-weight: 600; }

    /* The static row-symbol cells (_1) — render but greyed so the diagram still reads */
    .label.symbol { background: rgba(220,220,220,0.7); color: #333;
                    justify-content: center; font-size: clamp(7px, 0.9cqw, 11px); }

    .vkb-footer { padding: 0.5rem 1rem; font-size: 0.8rem; color: #777; text-align: center; }

    /* ============================================================
       Boopidoo section styles (verbatim from configmap.yml,
       namespaced under .boopidoo-view).
       The original body { width:1088px; padding:24px; ... } is
       applied to .boopidoo-view instead, so the document <body>
       keeps the VKB-friendly margin:0 / 100vw layout.
       ============================================================ */
    .boopidoo-view {
      --bg: #0a0e14;
      --panel: #131920;
      --panel-border: #1e2a36;
      --accent-orange: #f59e0b;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --text-muted: #475569;
      --keypad-bg: #1a1f28;
      --key-bg: #0f1318;
      --key-border: #2a3544;
      --unbound: #334155;
      --mode-travel: #06b6d4;
      --mode-explo:  #22c55e;
      --mode-mining: #f59e0b;
      --mode-combat: #ef4444;
      --c-flight: #38bdf8;
      --c-ui:     #a78bfa;
      --c-panel:  #c084fc;
      --c-power:  #fbbf24;
      --c-fire:   #ef4444;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      padding: 24px;
      width: 1088px;          /* design width; zoom script scales this to viewport */
      transform-origin: top left;
    }
    .boopidoo-view * { margin: 0; padding: 0; box-sizing: border-box; }
    .boopidoo-view h1 { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--accent-orange); text-transform: uppercase; letter-spacing: 3px; text-align: center; margin-bottom: 4px; }
    .boopidoo-view .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); text-align: center; letter-spacing: 2px; margin-bottom: 20px; }
    .boopidoo-view .legend-row { display: flex; justify-content: center; gap: 18px; margin-bottom: 8px; flex-wrap: wrap; }
    .boopidoo-view .legend-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; align-self: center; }
    .boopidoo-view .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); letter-spacing: 1px; }
    .boopidoo-view .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .boopidoo-view .legend-tag { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 10px; padding: 1px 5px; border-radius: 2px; background: rgba(255,255,255,0.05); }
    .boopidoo-view .device { max-width: 1040px; margin: 0 auto; background: var(--panel); border: 1px solid var(--panel-border); border-radius: 12px; padding: 28px 24px 24px; position: relative; }
    .boopidoo-view .device::before { content: 'BOOPIDOO HOTAS \B7 4-MODE'; position: absolute; top: -10px; left: 24px; background: var(--panel); padding: 0 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 2px; }
    .boopidoo-view .top-row { display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; padding: 0 20px; }
    .boopidoo-view .btn-group { display: flex; gap: 6px; align-items: start; }
    .boopidoo-view .btn-group-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); text-align: center; margin-bottom: 4px; letter-spacing: 1px; }
    .boopidoo-view .small-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 64px; }
    .boopidoo-view .small-btn-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--panel-border); background: var(--key-bg); display: flex; align-items: center; justify-content: center; }
    .boopidoo-view .small-btn-id { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-muted); display: block; margin-top: 2px; }
    .boopidoo-view .small-btn-fn { font-size: 12px; font-weight: 600; text-align: center; line-height: 1.2; max-width: 80px; }
    .boopidoo-view .small-btn-fn2 { font-size: 10px; text-align: center; line-height: 1.1; max-width: 80px; opacity: 0.7; }
    .boopidoo-view .b-flight { border-color: var(--c-flight) !important; }
    .boopidoo-view .b-fire   { border-color: var(--c-fire) !important; }
    .boopidoo-view .b-ui     { border-color: var(--c-ui) !important; }
    .boopidoo-view .b-power  { border-color: var(--c-power) !important; }
    .boopidoo-view .c-flight { color: var(--c-flight); }
    .boopidoo-view .c-ui     { color: var(--c-ui); }
    .boopidoo-view .c-panel  { color: var(--c-panel); }
    .boopidoo-view .c-power  { color: var(--c-power); }
    .boopidoo-view .c-fire   { color: var(--c-fire); }
    .boopidoo-view .push-btn-section { display: flex; justify-content: space-between; padding: 0 20px; margin-bottom: 6px; }
    .boopidoo-view .push-btn-info { background: var(--key-bg); border: 1px solid var(--panel-border); border-radius: 6px; padding: 8px 14px; text-align: center; min-width: 130px; }
    .boopidoo-view .push-btn-info .pbtn-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
    .boopidoo-view .push-btn-info .pbtn-fn { font-size: 13px; font-weight: 700; line-height: 1.3; }
    .boopidoo-view .dual { border-top: 1px dashed var(--panel-border); margin-top: 3px; padding-top: 3px; }
    .boopidoo-view .main-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: start; }
    .boopidoo-view .stick-panel { background: var(--key-bg); border: 1px solid var(--panel-border); border-radius: 8px; padding: 16px; text-align: center; }
    .boopidoo-view .stick-label { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent-orange); letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase; }
    .boopidoo-view .stick-visual { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--panel-border); margin: 0 auto 12px; position: relative; background: radial-gradient(circle at 40% 35%, #1e2a36, #0a0e14); }
    .boopidoo-view .stick-visual::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; border-radius: 50%; background: #2a3544; border: 1px solid #3a4a5a; }
    .boopidoo-view .axis-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; background: var(--keypad-bg); border-radius: 4px; font-size: 12px; margin-bottom: 4px; }
    .boopidoo-view .axis-dir { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
    .boopidoo-view .axis-fn { font-weight: 700; }
    .boopidoo-view .stick-btn { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: 700; text-align: center; border: 1px solid var(--c-fire); background: rgba(239,68,68,0.08); }
    .boopidoo-view .stick-btn .btn-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px; }
    .boopidoo-view .keypad-section { width: 320px; }
    .boopidoo-view .keypad-title { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent-orange); letter-spacing: 2px; text-align: center; margin-bottom: 8px; text-transform: uppercase; }
    .boopidoo-view .keypad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .boopidoo-view .key { background: var(--key-bg); border: 1px solid var(--key-border); border-radius: 4px; padding: 5px 4px; text-align: center; min-height: 52px; display: flex; flex-direction: column; justify-content: center; }
    .boopidoo-view .key-cap { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
    .boopidoo-view .key-fn { font-size: 11px; font-weight: 700; line-height: 1.2; }
    .boopidoo-view .key.key-modes { min-height: 92px; padding: 4px 3px 4px; border-color: var(--panel-border); }
    .boopidoo-view .key-modes .key-cap, .boopidoo-view .key-power .key-cap { margin-bottom: 4px; font-size: 12px; color: var(--text); font-weight: 700; }
    .boopidoo-view .key-joy { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-muted); font-weight: 400; margin-left: 4px; letter-spacing: 0; }
    .boopidoo-view .mode-row { display: flex; gap: 4px; align-items: baseline; padding: 1px 2px; line-height: 1.15; font-weight: 600; }
    .boopidoo-view .mode-tag { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 8px; opacity: 0.85; width: 9px; flex-shrink: 0; text-align: left; }
    .boopidoo-view .mode-text { flex: 1; text-align: left; font-size: 9px; }
    .boopidoo-view .mode-row.travel { color: var(--mode-travel); }
    .boopidoo-view .mode-row.explo  { color: var(--mode-explo); }
    .boopidoo-view .mode-row.mining { color: var(--mode-mining); }
    .boopidoo-view .mode-row.combat { color: var(--mode-combat); }
    .boopidoo-view .key.key-power { background: rgba(251,191,36,0.06); border-color: var(--c-power); }
    .boopidoo-view .key.key-power .key-fn { color: var(--c-power); }
    .boopidoo-view .bottom-row { display: flex; justify-content: space-between; align-items: start; gap: 16px; margin-top: 20px; padding: 0 20px; }
    .boopidoo-view .pov-section, .boopidoo-view .switch-section { background: var(--key-bg); border: 1px solid var(--panel-border); border-radius: 8px; padding: 14px; text-align: center; }
    .boopidoo-view .pov-section { flex-shrink: 0; }
    .boopidoo-view .switch-section { flex: 1; }
    .boopidoo-view .pov-label, .boopidoo-view .switch-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent-orange); letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
    .boopidoo-view .pov-grid { display: grid; grid-template-columns: repeat(3, 64px); gap: 4px; margin: 0 auto; }
    .boopidoo-view .pov-cell { padding: 4px 3px; text-align: center; font-size: 10px; font-weight: 600; border-radius: 4px; min-height: 44px; display: flex; align-items: center; justify-content: center; line-height: 1.15; }
    .boopidoo-view .pov-cell.cardinal { background: rgba(167,139,250,0.08); border: 1px solid var(--c-ui); color: var(--c-ui); }
    .boopidoo-view .pov-cell.diagonal { background: rgba(192,132,252,0.08); border: 1px solid var(--c-panel); color: var(--c-panel); }
    .boopidoo-view .pov-cell.center { background: var(--keypad-bg); border: 1px solid var(--panel-border); color: var(--c-ui); }
    .boopidoo-view .pov-fn-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-muted); display: block; margin-bottom: 1px; }
    .boopidoo-view .switch-positions { display: flex; gap: 8px; justify-content: center; }
    .boopidoo-view .switch-pos { padding: 8px 10px; background: var(--keypad-bg); border: 2px solid var(--panel-border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); text-align: center; flex: 1; max-width: 110px; }
    .boopidoo-view .switch-pos .sw-num { font-size: 9px; color: var(--text-muted); display: block; margin-bottom: 4px; }
    .boopidoo-view .switch-pos .sw-mode { font-size: 12px; font-weight: 700; letter-spacing: 1px; display: block; margin-bottom: 2px; }
    .boopidoo-view .switch-pos .sw-pos { font-size: 9px; color: var(--text-muted); }
    .boopidoo-view .switch-pos.travel { background: rgba(6,182,212,0.18); border-color: var(--mode-travel); }
    .boopidoo-view .switch-pos.travel .sw-mode { color: var(--mode-travel); }
    .boopidoo-view .switch-pos.explo  { background: rgba(34,197,94,0.18); border-color: var(--mode-explo); }
    .boopidoo-view .switch-pos.explo  .sw-mode { color: var(--mode-explo); }
    .boopidoo-view .switch-pos.mining { background: rgba(245,158,11,0.18); border-color: var(--mode-mining); }
    .boopidoo-view .switch-pos.mining .sw-mode { color: var(--mode-mining); }
    .boopidoo-view .switch-pos.combat { background: rgba(239,68,68,0.18); border-color: var(--mode-combat); }
    .boopidoo-view .switch-pos.combat .sw-mode { color: var(--mode-combat); }
    .boopidoo-view .context-section { max-width: 1040px; margin: 18px auto 0; padding: 16px 20px; background: var(--panel); border: 1px solid var(--panel-border); border-radius: 10px; }
    .boopidoo-view .context-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    .boopidoo-view .context-title { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--accent-orange); letter-spacing: 2px; text-transform: uppercase; }
    .boopidoo-view .context-subtitle { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .boopidoo-view .binding-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .boopidoo-view .binding-table th, .boopidoo-view .binding-table td { text-align: left; padding: 5px 8px; border-bottom: 1px solid var(--panel-border); }
    .boopidoo-view .binding-table th { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; background: var(--keypad-bg); border-bottom: 1px solid var(--panel-border); }
    .boopidoo-view .binding-table td.joy { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); white-space: nowrap; }
    .boopidoo-view .binding-table td.action { font-weight: 600; }
    .boopidoo-view .two-col-tables { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .boopidoo-view .notes { max-width: 1040px; margin: 18px auto 0; padding: 14px 18px; background: var(--panel); border: 1px solid var(--panel-border); border-radius: 8px; font-size: 13px; color: var(--text-dim); line-height: 1.6; }
    .boopidoo-view .notes strong { color: var(--text); font-weight: 600; }
    .boopidoo-view .notes .note-icon { color: var(--accent-orange); margin-right: 4px; }
    .boopidoo-view .notes p { margin-top: 6px; }
    .boopidoo-view .notes p:first-child { margin-top: 0; }
    @media print {
      .boopidoo-view { background: #fff; color: #000; padding: 12px; width: auto; }
      .boopidoo-view .device, .boopidoo-view .notes, .boopidoo-view .context-section { background: #fafafa; border-color: #ccc; }
      .boopidoo-view .key, .boopidoo-view .stick-panel, .boopidoo-view .pov-section, .boopidoo-view .switch-section, .boopidoo-view .push-btn-info { background: #fff; border-color: #ccc; }
      .boopidoo-view h1 { color: #b45309; }
    }
    </style>
    </head>
    <body>

    <header class="app-header">
      <div class="brand">Elite Controls</div>
      <nav>
        <a href="?view=boopidoo" class="nav-link" data-view="boopidoo">Boopidoo HOTAS</a>
        <a href="?view=vkb" class="nav-link" data-view="vkb">VKB Gladiator</a>
      </nav>
    </header>

    <!-- ============================================================
         BOOPIDOO SECTION
         ============================================================ -->
    <div id="boopidoo-section" hidden>
    <div class="boopidoo-view">
      <h1 id="bp-title"></h1>
      <div class="subtitle" id="bp-subtitle"></div>
      <div style="text-align:center;margin-bottom:16px;">
        <select id="bp-profile" style="font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--key-bg);color:var(--text);border:1px solid var(--panel-border);border-radius:4px;padding:3px 8px;cursor:pointer;"></select>
      </div>
      <div id="bp-legend-modes" class="legend-row"></div>
      <div class="legend-row">
        <span class="legend-label">Common:</span>
        <div class="legend-item"><div class="legend-dot" style="background:var(--c-flight)"></div>FLIGHT</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--c-fire)"></div>FIRE</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--c-ui)"></div>UI NAV</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--c-panel)"></div>PANEL FOCUS</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--c-power)"></div>POWER PIPS</div>
      </div>
      <div class="device">
        <div class="top-row">
          <div>
            <div class="btn-group-label">LEFT BUTTONS &middot; TOP ROW</div>
            <div class="btn-group" id="bp-top-left"></div>
          </div>
          <div>
            <div class="btn-group-label">RIGHT BUTTONS &middot; TOP ROW</div>
            <div class="btn-group" id="bp-top-right"></div>
          </div>
        </div>
        <div class="push-btn-section" id="bp-push-btns"></div>
        <div class="main-row">
          <div class="stick-panel" id="bp-left-stick"></div>
          <div class="keypad-section">
            <div class="keypad-title">4&times;4 Keypad</div>
            <div class="keypad-grid" id="bp-keypad"></div>
          </div>
          <div class="stick-panel" id="bp-right-stick"></div>
        </div>
        <div class="bottom-row">
          <div class="pov-section">
            <div class="pov-label">POV Hat &middot; 8-Way</div>
            <div class="pov-grid" id="bp-pov"></div>
          </div>
          <div class="switch-section" id="bp-switch"></div>
        </div>
      </div>
      <div id="bp-contexts"></div>
      <div id="bp-notes"></div>
    </div>
    </div>

    <!-- ============================================================
         VKB SECTION
         ============================================================ -->
    <div id="vkb-section" hidden>
      <div class="vkb-toolbar">
        <h2>VKB Gladiator</h2>
        <select id="side">
          <option value="lh">Left Stick (LH)</option>
          <option value="rh">Right Stick (RH)</option>
        </select>
        <select id="profile">
          <!-- populated from _index.json -->
        </select>
        <span class="meta" id="meta"></span>
        <span style="flex:1"></span>
        <button id="toggle-empty">Hide empty</button>
      </div>

      <div class="stage" id="stage"></div>

      <div class="vkb-footer"><span id="status"></span></div>
    </div>

    <script>
    // ============================================================
    // VKB asset base — PNG backgrounds served from GitHub raw so
    // the cluster ConfigMap can stay text-only.
    // ============================================================
    const ASSET_BASE = 'https://raw.githubusercontent.com/SRF-Audio/utility-scripts/main/hetzner/k8s/hotas_mappings/assets/';

    // ============================================================
    // View switching
    // ============================================================
    function getView() {
      const v = new URLSearchParams(location.search).get('view') || '';
      return v.startsWith('vkb') ? 'vkb' : 'boopidoo';
    }

    let vkbInitialized = false;
    let bpInitialized  = false;

    function showView(view) {
      document.getElementById('boopidoo-section').hidden = (view !== 'boopidoo');
      document.getElementById('vkb-section').hidden = (view !== 'vkb');
      document.querySelectorAll('.nav-link').forEach(a => {
        a.classList.toggle('active', a.dataset.view === view);
      });
      if (view === 'boopidoo') {
        applyBoopidooZoom();
        if (!bpInitialized) {
          bpInitialized = true;
          initBoopidoo().catch(e => console.error('Boopidoo init error:', e));
        }
      }
      if (view === 'vkb' && !vkbInitialized) {
        vkbInitialized = true;
        initVKB().catch(e => {
          const s = document.getElementById('status');
          if (s) s.textContent = 'Error: ' + e.message;
        });
      }
    }

    window.addEventListener('popstate', () => showView(getView()));

    document.querySelectorAll('.nav-link').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        const v = a.dataset.view;
        history.pushState({}, '', '?view=' + v);
        showView(v);
      });
    });

    // ============================================================
    // Boopidoo zoom — scope to .boopidoo-view (not <body>) so the
    // VKB layout's 100vw stage isn't mangled. Only meaningful when
    // Boopidoo is the active view, but applying it always is cheap
    // and harmless (hidden element still scales, no layout impact).
    // ============================================================
    function applyBoopidooZoom() {
      const el = document.querySelector('.boopidoo-view');
      if (!el) return;
      el.style.zoom = window.innerWidth / 1088;
    }
    applyBoopidooZoom();
    window.addEventListener('resize', applyBoopidooZoom);

    // ============================================================
    // Boopidoo — data-driven rendering, lazy-init on first visit.
    // Profile JSON fetched from _boopidoo_index.json on demand.
    // ============================================================
    let bpProfileEl;

    async function initBoopidoo() {
      bpProfileEl = document.getElementById('bp-profile');
      const idx = await loadJSON('_boopidoo_index.json');
      idx.profiles.forEach(p => {
        const o = document.createElement('option');
        o.value = p.id; o.textContent = p.name;
        bpProfileEl.appendChild(o);
      });
      const params = new URLSearchParams(location.search);
      if (params.get('bpprofile')) bpProfileEl.value = params.get('bpprofile');
      bpProfileEl.onchange = renderBoopidoo;
      await renderBoopidoo();
    }

    async function renderBoopidoo() {
      try {
        const profile = await loadJSON(bpProfileEl.value + '.json');
        _renderBoopidoo(profile);
      } catch (e) { console.error('Boopidoo render error:', e); }
    }

    function _renderBoopidoo(p) {
      document.getElementById('bp-title').textContent = p.name || '';
      document.getElementById('bp-subtitle').textContent = p.subtitle || '';
      const ml = document.getElementById('bp-legend-modes');
      ml.innerHTML = (p.modes && p.modes.length) ?
        '<span class="legend-label">Modes:</span>' +
        p.modes.map(m => `<div class="legend-item"><span class="legend-tag" style="color:var(--mode-${m.style})">${m.tag}</span>${m.legend}</div>`).join('') : '';
      _bpBtnGroup('bp-top-left',  p.top_left  || []);
      _bpBtnGroup('bp-top-right', p.top_right || []);
      _bpPushBtns(p.push_left, p.push_right);
      _bpStick('bp-left-stick',  'Left Stick',  p.left_stick  || {});
      _bpStick('bp-right-stick', 'Right Stick', p.right_stick || {});
      _bpKeypad(p.keypad || [], p.modes || []);
      _bpPov(p.pov || {});
      _bpSwitch(p.modes || [], p.switch_note || '');
      _bpContexts(p.contexts || []);
      _bpNotes(p.notes || []);
    }

    function _bpBtnGroup(id, btns) {
      document.getElementById(id).innerHTML = btns.map(b =>
        `<div class="small-btn">
          <div class="small-btn-circle b-${b.cat}"></div>
          <span class="small-btn-id">${b.joy}</span>
          <div class="small-btn-fn c-${b.cat}">${b.fn}</div>
          ${b.fn2 ? `<div class="small-btn-fn2 c-${b.cat2 || 'ui'}">${b.fn2}</div>` : ''}
        </div>`).join('');
    }

    function _bpPushBtns(pl, pr) {
      function ph(b, lbl) {
        return `<div class="push-btn-info">
          <div class="pbtn-label">${b.joy} &middot; ${lbl}</div>
          <div class="pbtn-fn c-${b.cat}">${b.fn}</div>
          ${b.fn2 ? `<div class="dual"><div class="pbtn-fn c-${b.cat2 || b.cat}" style="font-size:10px;">${b.fn2}</div></div>` : ''}
        </div>`;
      }
      document.getElementById('bp-push-btns').innerHTML = ph(pl, 'LEFT PUSH') + ph(pr, 'RIGHT PUSH');
    }

    function _bpStick(id, lbl, s) {
      function ax(dir, a) {
        return a ? `<div class="axis-row"><span class="axis-dir">${dir}</span><span class="axis-fn c-${a.cat || 'flight'}">${a.fn}</span></div>` : '';
      }
      document.getElementById(id).innerHTML =
        `<div class="stick-label">${lbl}</div>
        <div class="stick-visual"></div>
        ${ax('X (L/R)', s.x)}${ax('Y (F/B)', s.y)}${ax('Twist', s.twist)}
        ${s.press ? `<div class="stick-btn"><span class="btn-label">${s.press.joy} &middot; STICK PRESS</span><span class="c-${s.press.cat}">${s.press.fn}</span></div>` : ''}`;
    }

    function _bpKeypad(keys, modes) {
      document.getElementById('bp-keypad').innerHTML = keys.map(k => {
        if (k.type === 'mode') {
          const rows = (k.modes || []).map((fn, i) => {
            const m = modes[i] || {};
            const empty = !fn;
            return `<div class="mode-row ${m.style || ''}"><span class="mode-tag">${m.tag || ''}</span><span class="mode-text"${empty ? ' style="opacity:0.4;"' : ''}>${fn || '&mdash;'}</span></div>`;
          }).join('');
          return `<div class="key key-modes"><div class="key-cap">${k.cap}<span class="key-joy">${k.joy}</span></div>${rows}</div>`;
        }
        return `<div class="key key-power"><div class="key-cap">${k.cap}<span class="key-joy">${k.joy}</span></div><div class="key-fn">${k.fn}</div></div>`;
      }).join('');
    }

    function _bpPov(pov) {
      const cells = [
        {k:'nw',cls:'diagonal',a:'&#8598;'},{k:'n',cls:'cardinal',a:'&uarr;'},{k:'ne',cls:'diagonal',a:'&#8599;'},
        {k:'w',cls:'cardinal',a:'&larr;'},{k:'ctr',cls:'center',a:'PRESS'},{k:'e',cls:'cardinal',a:'&rarr;'},
        {k:'sw',cls:'diagonal',a:'&#8601;'},{k:'s',cls:'cardinal',a:'&darr;'},{k:'se',cls:'diagonal',a:'&#8600;'}
      ];
      document.getElementById('bp-pov').innerHTML = cells.map(c => {
        const fn = pov[c.k] || '';
        if (c.k === 'ctr') return `<div class="pov-cell ${c.cls}"><div><span class="pov-fn-label">${c.a}</span><div style="font-size:10px;font-weight:700;">${fn}</div></div></div>`;
        return `<div class="pov-cell ${c.cls}"><div><span class="pov-fn-label">${c.a}</span>${fn}</div></div>`;
      }).join('');
    }

    function _bpSwitch(modes, note) {
      const el = document.getElementById('bp-switch');
      if (!modes.length) { el.innerHTML = ''; return; }
      el.innerHTML =
        `<div class="switch-label">4-Way Slide Switch &middot; MODE SELECTOR</div>
        <div class="switch-positions">
          ${modes.map(m => `<div class="switch-pos ${m.style}"><span class="sw-num">${m.joy}</span><span class="sw-mode">${m.name}</span><span class="sw-pos">${m.pos}</span></div>`).join('')}
        </div>
        ${note ? `<div style="font-size:10px;color:var(--text-muted);margin-top:10px;">${note}</div>` : ''}`;
    }

    function _bpContexts(contexts) {
      document.getElementById('bp-contexts').innerHTML = contexts.map(ctx =>
        `<div class="context-section">
          <div class="context-header">
            <div class="context-title">${ctx.title}</div>
            <div class="context-subtitle">${ctx.subtitle || ''}</div>
          </div>
          <div class="two-col-tables">
            ${ctx.tables.map(tbl =>
              `<table class="binding-table">
                <tr><th>Physical</th><th>Joy ID</th><th>Action</th></tr>
                ${tbl.map(r => `<tr><td>${r[0]}</td><td class="joy">${r[1]}</td><td class="action">${r[2]}</td></tr>`).join('')}
              </table>`).join('')}
          </div>
          ${ctx.footer ? `<div style="font-size:11px;color:var(--text-muted);margin-top:10px;">${ctx.footer}</div>` : ''}
        </div>`).join('');
    }

    function _bpNotes(notes) {
      const el = document.getElementById('bp-notes');
      if (!notes.length) { el.innerHTML = ''; return; }
      el.innerHTML = `<div class="notes">${notes.map(n => `<p><span class="note-icon">&#9658;</span> ${n}</p>`).join('')}</div>`;
    }

    // ============================================================
    // VKB viewer — lazy-initialized when the VKB view is shown.
    // All fetches use flat paths (no profiles/ or assets/ prefix)
    // because the ConfigMap deploys every file at nginx root.
    // ============================================================
    let fields, profileIndex, currentProfile;
    let stage, sideEl, profEl, metaEl, statusEl, toggleEmpty;
    let hideEmpty = false;

    async function loadJSON(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`${url}: ${r.status}`);
      return r.json();
    }

    async function initVKB() {
      stage       = document.getElementById('stage');
      sideEl      = document.getElementById('side');
      profEl      = document.getElementById('profile');
      metaEl      = document.getElementById('meta');
      statusEl    = document.getElementById('status');
      toggleEmpty = document.getElementById('toggle-empty');

      fields = await loadJSON('fields.json');
      profileIndex = await loadJSON('_index.json');

      profileIndex.profiles.forEach(p => {
        const o = document.createElement('option');
        o.value = p.id; o.textContent = p.name;
        profEl.appendChild(o);
      });

      // URL-driven defaults
      const params = new URLSearchParams(location.search);
      if (params.get('side'))    sideEl.value = params.get('side');
      if (params.get('profile')) profEl.value = params.get('profile');

      sideEl.onchange = profEl.onchange = renderVKB;
      toggleEmpty.onclick = () => {
        hideEmpty = !hideEmpty;
        toggleEmpty.textContent = hideEmpty ? 'Show empty' : 'Hide empty';
        renderVKB();
      };

      await renderVKB();
    }

    async function renderVKB() {
      try {
        await _renderVKB();
      } catch (e) {
        if (statusEl) statusEl.textContent = 'Error: ' + e.message;
        else console.error(e);
      }
    }

    async function _renderVKB() {
      const side = sideEl.value;
      const profileId = profEl.value;
      const profile = await loadJSON(`${profileId}.json`);
      currentProfile = profile;

      // Update URL without reload — keep view=vkb alongside side/profile
      const u = new URL(location);
      u.searchParams.set('view', 'vkb');
      u.searchParams.set('side', side);
      u.searchParams.set('profile', profileId);
      history.replaceState(null, '', u);

      const data = fields[side];
      metaEl.textContent = `${profile.name} · ${side.toUpperCase()} · v${profile.version || '–'}`;
      stage.style.backgroundImage = `url(${ASSET_BASE}${data.image})`;
      stage.innerHTML = '';

      const sideBindings = profile[side] || {};
      let filled = 0;

      for (const f of data.fields) {
        const value = sideBindings[f.id];
        const isValueCol = f.value_col;
        const empty = !value;

        if (hideEmpty && isValueCol && empty) continue;
        // Skip the static label/symbol cells unless explicitly overridden — these
        // are already burned into the background image so we don't redraw them.
        if (!isValueCol && !value) continue;

        const el = document.createElement('div');
        el.className = 'label';
        if (!isValueCol) el.classList.add('symbol');
        if (empty) el.classList.add('empty');
        if (value && /modifier/i.test(value)) el.classList.add('modifier');

        const n = f.norm;
        el.style.left   = (n.left   * 100) + '%';
        el.style.top    = (n.top    * 100) + '%';
        el.style.width  = (n.width  * 100) + '%';
        el.style.height = (n.height * 100) + '%';
        el.title = `${f.id}: ${value || '(unbound)'}`;
        el.textContent = value || '';

        stage.appendChild(el);
        if (value) filled++;
      }

      const total = data.fields.filter(f => f.value_col).length;
      statusEl.textContent = `${filled}/${total} bindings shown`;
    }

    // ============================================================
    // Initial render
    // ============================================================
    showView(getView());
    </script>
    </body>
    </html>
