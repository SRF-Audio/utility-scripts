      },
      "right_stick": {
        "x":     { "fn": "Roll",         "cat": "flight" },
        "y":     { "fn": "Pitch ↕ inv", "cat": "flight" },
        "twist": { "fn": "Yaw",          "cat": "flight" },
        "press": { "joy": "Joy_26", "fn": "Primary Fire", "cat": "fire" }
      },
      "keypad": [
        { "cap": "1", "joy": "Joy_3",  "type": "mode",   "modes": ["Cargo Scoop",    "FSS Enter",       "Cargo Scoop",     "Hardpoints"    ] },
        { "cap": "2", "joy": "Joy_4",  "type": "mode",   "modes": ["Landing Gear",   "Discovery Scan",  "Hardpoints",      "Target Ahead"  ] },
        { "cap": "3", "joy": "Joy_5",  "type": "mode",   "modes": ["Lights",         "FSS Quit",        "Fire Group ◄","Fire Group ◄"] },
        { "cap": "A", "joy": "Joy_6",  "type": "mode",   "modes": ["Rot-Corr Off",   "FSS Target",      "Fire Group ►","Fire Group ►"] },
        { "cap": "4", "joy": "Joy_9",  "type": "mode",   "modes": ["Next Route Sys", "DSS 3rd-Person",  "Target Asteroid", "Hostile ◄"] },
        { "cap": "5", "joy": "Joy_10", "type": "mode",   "modes": ["HUD Mode",       "DSS View Toggle", "Lights",          "Hostile ►"] },
        { "cap": "6", "joy": "Joy_11", "type": "mode",   "modes": ["System Map",     "Genus ◄",    "System Map",      "Highest Threat"] },
        { "cap": "B", "joy": "Joy_12", "type": "mode",   "modes": ["Galaxy Map",     "Genus ►",    "Next Route Sys",  "Subsystem ►"] },
        { "cap": "7", "joy": "Joy_15", "type": "mode",   "modes": ["Head Look",      "Photo Cam",       "Night Vision",    "Heatsink"      ] },
        { "cap": "8", "joy": "Joy_16", "type": "mode",   "modes": ["Quick Comms",    "Vanity ◄",   "HUD Mode",        "Chaff"         ] },
        { "cap": "9", "joy": "Joy_17", "type": "mode",   "modes": ["Night Vision",   "Vanity ►",   "Orbit Lines",     "Shield Cell"   ] },
        { "cap": "C", "joy": "Joy_18", "type": "mode",   "modes": ["Codex",          "",                "Eject Cargo",     "ECM"           ] },
        { "cap": "*", "joy": "Joy_21", "type": "common", "fn": "WEP Pip",     "cat": "power" },
        { "cap": "0", "joy": "Joy_22", "type": "common", "fn": "SYS Pip",     "cat": "power" },
