        { "joy": "Joy_8",  "fn": "SPD 100%",                      "cat": "flight" }
      ],
      "top_right": [
        { "joy": "Joy_13", "fn": "FA Toggle",                      "cat": "flight" },
        { "joy": "Joy_14", "fn": "FSD Jump",  "fn2": "Next Panel", "cat": "flight", "cat2": "ui" },
        { "joy": "Joy_19", "fn": "S-Cruise",                       "cat": "flight" }
      ],
      "push_left":  { "joy": "Joy_1",  "fn": "Head Look", "fn2": "UI Back (panel ctx)",   "cat": "flight", "cat2": "ui" },
      "push_right": { "joy": "Joy_20", "fn": "BOOST",     "fn2": "UI Toggle (panel ctx)", "cat": "flight", "cat2": "ui" },
      "left_stick": {
