---
# Hetzner Paperless-NGX kustomization.
# Files that differ from homelab: pvcs.yml, webserver.yml (updated PVC names).
# All other files are equivalent copies from k8s/paperless_ngx/.
# NOTE: pv-paperless-consume.yml is intentionally omitted — the consume PVC
#       is dynamically provisioned via local-path on Hetzner (no manual NFS PV).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yml
  - configmap.yml
  - pvcs.yml
  - gotenberg.yml
  - tika.yml
  - webserver.yml
  - ingress.yml
