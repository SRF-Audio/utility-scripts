---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ed-hotas-html
  namespace: apps-ed-hotas
  labels:
    app.kubernetes.io/name: ed-hotas
    app.kubernetes.io/component: webserver
    app.kubernetes.io/managed-by: argocd
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boopidoo HOTAS — Elite Dangerous 4-Mode Bindings</title>
    <!--
      ============================================================
      BOOPIDOO HOTAS — PHYSICAL-TO-JOYSTICK MAPPING REFERENCE
      Device ID: 1B509206
      Profile:   Custom4mode (generated by gen-4mode-binds.py)
      ============================================================
      AXES:
        Left Stick X        = Joy_RXAxis   (X Rotation)
        Left Stick Y        = Joy_RYAxis   (Y Rotation)
        Left Stick Twist    = Joy_RZAxis   (Z Rotation)
        Right Stick X       = Joy_XAxis    (X Axis)
        Right Stick Y       = Joy_YAxis    (Y Axis)
        Right Stick Twist   = Joy_ZAxis    (Z Axis)
      BUTTONS:
        Left Push Button    = Joy_1        Right Push Button   = Joy_20
        Top Left  - Left    = Joy_2        Top Right - Left    = Joy_13
        Top Left  - Middle  = Joy_7        Top Right - Middle  = Joy_14
        Top Left  - Right   = Joy_8        Top Right - Right   = Joy_19
        Left Stick Press    = Joy_25       Right Stick Press   = Joy_26
        POV Hat Press       = Joy_32
      KEYPAD (rows 1-3 mode-multiplexed; row 4 common power):
        Key 1 = Joy_3       Key 2 = Joy_4       Key 3 = Joy_5       Key A = Joy_6
        Key 4 = Joy_9       Key 5 = Joy_10      Key 6 = Joy_11      Key B = Joy_12
        Key 7 = Joy_15      Key 8 = Joy_16      Key 9 = Joy_17      Key C = Joy_18
        Key * = Joy_21      Key 0 = Joy_22      Key # = Joy_23      Key D = Joy_24
      POV HAT (8-way + press):
        Cardinals  = UI navigation         (Joy_POV1Up/Down/Left/Right)
        Diagonals  = Direct panel focus    (Joy_POV1UpLeft/UpRight/DownLeft/DownRight)
        Press      = UI Select / HeadLook  (Joy_32)
      4-WAY SLIDE SWITCH (latching, always-on — MODE SELECTOR):
        Position 1 (leftmost)  = Joy_30  -> TRAVEL
        Position 2             = Joy_29  -> EXPLORATION
        Position 3             = Joy_28  -> MINING
        Position 4 (rightmost) = Joy_27  -> COMBAT
      ============================================================
    -->
    <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&display=swap');
    :root {
      --bg: #0a0e14;
      --panel: #131920;
      --panel-border: #1e2a36;
      --accent-orange: #f59e0b;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --text-muted: #475569;
      --keypad-bg: #1a1f28;
      --key-bg: #0f1318;
      --key-border: #2a3544;
      --unbound: #334155;
      /* Mode colors (slide-switch positions) */
      --mode-travel: #06b6d4;
      --mode-explo:  #22c55e;
      --mode-mining: #f59e0b;
      --mode-combat: #ef4444;
      /* Common-context category colors */
      --c-flight: #38bdf8;
      --c-ui:     #a78bfa;
      --c-panel:  #c084fc;
      --c-power:  #fbbf24;
      --c-fire:   #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding: 24px; }
    h1 { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--accent-orange); text-transform: uppercase; letter-spacing: 3px; text-align: center; margin-bottom: 4px; }
    .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); text-align: center; letter-spacing: 2px; margin-bottom: 20px; }
    /* Legends */
    .legend-row { display: flex; justify-content: center; gap: 18px; margin-bottom: 8px; flex-wrap: wrap; }
    .legend-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; align-self: center; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); letter-spacing: 1px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .legend-tag { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 10px; padding: 1px 5px; border-radius: 2px; background: rgba(255,255,255,0.05); }
    /* Device card */
    .device { max-width: 1040px; margin: 0 auto; background: var(--panel); border: 1px solid var(--panel-border); border-radius: 12px; padding: 28px 24px 24px; position: relative; }
    .device::before { content: 'BOOPIDOO HOTAS · 4-MODE'; position: absolute; top: -10px; left: 24px; background: var(--panel); padding: 0 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 2px; }
    .top-row { display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; padding: 0 20px; }
    .btn-group { display: flex; gap: 6px; align-items: start; }
    .btn-group-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); text-align: center; margin-bottom: 4px; letter-spacing: 1px; }
    .small-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 64px; }
    .small-btn-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--panel-border); background: var(--key-bg); display: flex; align-items: center; justify-content: center; }
    .small-btn-id { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-muted); }
    .small-btn-fn { font-size: 12px; font-weight: 600; text-align: center; line-height: 1.2; max-width: 80px; }
    .small-btn-fn2 { font-size: 10px; text-align: center; line-height: 1.1; max-width: 80px; opacity: 0.7; }
    .b-flight { border-color: var(--c-flight) !important; }
    .b-fire   { border-color: var(--c-fire) !important; }
    .b-ui     { border-color: var(--c-ui) !important; }
    .b-power  { border-color: var(--c-power) !important; }
    .c-flight { color: var(--c-flight); }
    .c-ui     { color: var(--c-ui); }
    .c-panel  { color: var(--c-panel); }
    .c-power  { color: var(--c-power); }
    .c-fire   { color: var(--c-fire); }
    /* Push buttons */
    .push-btn-section { display: flex; justify-content: space-between; padding: 0 20px; margin-bottom: 6px; }
    .push-btn-info { background: var(--key-bg); border: 1px solid var(--panel-border); border-radius: 6px; padding: 8px 14px; text-align: center; min-width: 130px; }
    .push-btn-info .pbtn-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
    .push-btn-info .pbtn-fn { font-size: 13px; font-weight: 700; line-height: 1.3; }
    .dual { border-top: 1px dashed var(--panel-border); margin-top: 3px; padding-top: 3px; }
    /* Main row: sticks + keypad */
    .main-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: start; }
    .stick-panel { background: var(--key-bg); border: 1px solid var(--panel-border); border-radius: 8px; padding: 16px; text-align: center; }
    .stick-label { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent-orange); letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase; }
    .stick-visual { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--panel-border); margin: 0 auto 12px; position: relative; background: radial-gradient(circle at 40% 35%, #1e2a36, #0a0e14); }
    .stick-visual::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; border-radius: 50%; background: #2a3544; border: 1px solid #3a4a5a; }
    .axis-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; background: var(--keypad-bg); border-radius: 4px; font-size: 12px; margin-bottom: 4px; }
    .axis-dir { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
    .axis-fn { font-weight: 700; }
    .stick-btn { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: 700; text-align: center; border: 1px solid var(--c-fire); background: rgba(239,68,68,0.08); }
    .stick-btn .btn-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px; }
    /* Keypad */
    .keypad-section { width: 320px; }
    .keypad-title { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent-orange); letter-spacing: 2px; text-align: center; margin-bottom: 8px; text-transform: uppercase; }
    .keypad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .key { background: var(--key-bg); border: 1px solid var(--key-border); border-radius: 4px; padding: 5px 4px; text-align: center; min-height: 52px; display: flex; flex-direction: column; justify-content: center; }
    .key-cap { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
    .key-fn { font-size: 11px; font-weight: 700; line-height: 1.2; }
    /* Mode-multiplexed key: 4 mini-rows, one per mode */
    .key.key-modes { min-height: 92px; padding: 4px 3px 4px; border-color: var(--panel-border); }
    .key-modes .key-cap { margin-bottom: 4px; font-size: 12px; color: var(--text); font-weight: 700; }
    .mode-row { display: flex; gap: 4px; align-items: baseline; padding: 1px 2px; line-height: 1.15; font-weight: 600; }
    .mode-tag { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 8px; opacity: 0.85; width: 9px; flex-shrink: 0; text-align: left; }
    .mode-text { flex: 1; text-align: left; font-size: 9px; }
    .mode-row.travel { color: var(--mode-travel); }
    .mode-row.explo  { color: var(--mode-explo); }
    .mode-row.mining { color: var(--mode-mining); }
    .mode-row.combat { color: var(--mode-combat); }
    .mode-row.free   { color: var(--text-muted); opacity: 0.4; font-style: italic; }
    /* Common keypad keys (bottom row, power) */
    .key.key-power { background: rgba(251, 191, 36, 0.06); border-color: var(--c-power); }
    .key.key-power .key-fn { color: var(--c-power); }
    /* Bottom row: POV hat & slide switch */
    .bottom-row { display: flex; justify-content: space-between; align-items: start; gap: 16px; margin-top: 20px; padding: 0 20px; }
    .pov-section, .switch-section { background: var(--key-bg); border: 1px solid var(--panel-border); border-radius: 8px; padding: 14px; text-align: center; }
    .pov-section { flex-shrink: 0; }
    .switch-section { flex: 1; }
    .pov-label, .switch-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent-orange); letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
    .pov-grid { display: grid; grid-template-columns: repeat(3, 64px); gap: 4px; margin: 0 auto; }
    .pov-cell { padding: 4px 3px; text-align: center; font-size: 10px; font-weight: 600; border-radius: 4px; min-height: 44px; display: flex; align-items: center; justify-content: center; line-height: 1.15; }
    .pov-cell.cardinal { background: rgba(167,139,250,0.08); border: 1px solid var(--c-ui); color: var(--c-ui); }
    .pov-cell.diagonal { background: rgba(192,132,252,0.08); border: 1px solid var(--c-panel); color: var(--c-panel); }
    .pov-cell.center { background: var(--keypad-bg); border: 1px solid var(--panel-border); color: var(--c-ui); }
    .pov-fn-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-muted); display: block; margin-bottom: 1px; }
    /* Slide switch — mode-colored positions */
    .switch-positions { display: flex; gap: 8px; justify-content: center; }
    .switch-pos { padding: 8px 10px; background: var(--keypad-bg); border: 2px solid var(--panel-border); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); text-align: center; flex: 1; max-width: 110px; }
    .switch-pos .sw-num { font-size: 9px; color: var(--text-muted); display: block; margin-bottom: 4px; }
    .switch-pos .sw-mode { font-size: 12px; font-weight: 700; letter-spacing: 1px; display: block; margin-bottom: 2px; }
    .switch-pos .sw-pos { font-size: 9px; color: var(--text-muted); }
    .switch-pos.travel { background: rgba(6,182,212,0.18); border-color: var(--mode-travel); }
    .switch-pos.travel .sw-mode { color: var(--mode-travel); }
    .switch-pos.explo  { background: rgba(34,197,94,0.18); border-color: var(--mode-explo); }
    .switch-pos.explo  .sw-mode { color: var(--mode-explo); }
    .switch-pos.mining { background: rgba(245,158,11,0.18); border-color: var(--mode-mining); }
    .switch-pos.mining .sw-mode { color: var(--mode-mining); }
    .switch-pos.combat { background: rgba(239,68,68,0.18); border-color: var(--mode-combat); }
    .switch-pos.combat .sw-mode { color: var(--mode-combat); }
    /* Context sections (SRV, Humanoid) */
    .context-section { max-width: 1040px; margin: 18px auto 0; padding: 16px 20px; background: var(--panel); border: 1px solid var(--panel-border); border-radius: 10px; }
    .context-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    .context-title { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--accent-orange); letter-spacing: 2px; text-transform: uppercase; }
    .context-subtitle { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .binding-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .binding-table th, .binding-table td { text-align: left; padding: 5px 8px; border-bottom: 1px solid var(--panel-border); }
    .binding-table th { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; background: var(--keypad-bg); border-bottom: 1px solid var(--panel-border); }
    .binding-table td.joy { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); white-space: nowrap; }
    .binding-table td.action { font-weight: 600; }
    .two-col-tables { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .two-col-tables { grid-template-columns: 1fr; } }
    /* Notes */
    .notes { max-width: 1040px; margin: 18px auto 0; padding: 14px 18px; background: var(--panel); border: 1px solid var(--panel-border); border-radius: 8px; font-size: 13px; color: var(--text-dim); line-height: 1.6; }
    .notes strong { color: var(--text); font-weight: 600; }
    .notes .note-icon { color: var(--accent-orange); margin-right: 4px; }
    .notes p { margin-top: 6px; }
    .notes p:first-child { margin-top: 0; }
    @media print {
      body { background: #fff; color: #000; padding: 12px; }
      .device, .notes, .context-section { background: #fafafa; border-color: #ccc; }
      .key, .stick-panel, .pov-section, .switch-section, .push-btn-info { background: #fff; border-color: #ccc; }
      h1 { color: #b45309; }
    }
    </style>
    </head>
    <body>
    <h1>Elite Dangerous — Boopidoo 4-Mode HOTAS</h1>
    <div class="subtitle">Profile: Custom4mode &middot; Latching switch = mode selector</div>
    <div class="legend-row">
      <span class="legend-label">Modes:</span>
      <div class="legend-item"><span class="legend-tag" style="color:var(--mode-travel)">T</span>Travel / Docking · Pos 1</div>
      <div class="legend-item"><span class="legend-tag" style="color:var(--mode-explo)">E</span>Exploration · Pos 2</div>
      <div class="legend-item"><span class="legend-tag" style="color:var(--mode-mining)">M</span>Mining · Pos 3</div>
      <div class="legend-item"><span class="legend-tag" style="color:var(--mode-combat)">C</span>Combat · Pos 4</div>
    </div>
    <div class="legend-row">
      <span class="legend-label">Common:</span>
      <div class="legend-item"><div class="legend-dot" style="background:var(--c-flight)"></div>FLIGHT</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--c-fire)"></div>FIRE</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--c-ui)"></div>UI NAV</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--c-panel)"></div>PANEL FOCUS</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--c-power)"></div>POWER PIPS</div>
    </div>
    <div class="device">
      <!-- Top button row -->
      <div class="top-row">
        <div>
          <div class="btn-group-label">LEFT BUTTONS · TOP ROW</div>
          <div class="btn-group">
            <div class="small-btn" data-joy="Joy_2">
              <div class="small-btn-circle b-flight"><span class="small-btn-id">2</span></div>
              <div class="small-btn-fn c-flight">SPD 0%</div>
              <div class="small-btn-fn2 c-ui">Prev Panel</div>
            </div>
            <div class="small-btn" data-joy="Joy_7">
              <div class="small-btn-circle b-flight"><span class="small-btn-id">7</span></div>
              <div class="small-btn-fn c-flight">SPD 50%</div>
            </div>
            <div class="small-btn" data-joy="Joy_8">
              <div class="small-btn-circle b-flight"><span class="small-btn-id">8</span></div>
              <div class="small-btn-fn c-flight">SPD 100%</div>
            </div>
          </div>
        </div>
        <div>
          <div class="btn-group-label">RIGHT BUTTONS · TOP ROW</div>
          <div class="btn-group">
            <div class="small-btn" data-joy="Joy_13">
              <div class="small-btn-circle b-flight"><span class="small-btn-id">13</span></div>
              <div class="small-btn-fn c-flight">FA Toggle</div>
            </div>
            <div class="small-btn" data-joy="Joy_14">
              <div class="small-btn-circle b-flight"><span class="small-btn-id">14</span></div>
              <div class="small-btn-fn c-flight">FSD Jump</div>
              <div class="small-btn-fn2 c-ui">Next Panel</div>
            </div>
            <div class="small-btn" data-joy="Joy_19">
              <div class="small-btn-circle b-flight"><span class="small-btn-id">19</span></div>
              <div class="small-btn-fn c-flight">S-Cruise</div>
            </div>
          </div>
        </div>
      </div>
      <!-- Push buttons -->
      <div class="push-btn-section">
        <div class="push-btn-info" data-joy="Joy_1">
          <div class="pbtn-label">BTN 1 &middot; LEFT PUSH</div>
          <div class="pbtn-fn c-ui">UI Focus / UI Back</div>
          <div class="dual">
            <div class="pbtn-fn" style="font-size:10px;color:var(--text-dim);">context-dual</div>
          </div>
        </div>
        <div class="push-btn-info" data-joy="Joy_20">
          <div class="pbtn-label">BTN 20 &middot; RIGHT PUSH</div>
          <div class="pbtn-fn c-flight">BOOST</div>
          <div class="dual">
            <div class="pbtn-fn c-ui" style="font-size:10px;">UI Toggle (panel ctx)</div>
          </div>
        </div>
      </div>
      <!-- Sticks + Keypad -->
      <div class="main-row">
        <div class="stick-panel" data-joy-device="left-stick">
          <div class="stick-label">Left Stick</div>
          <div class="stick-visual"></div>
          <div class="axis-row" data-joy="Joy_RXAxis"><span class="axis-dir">X (L/R)</span><span class="axis-fn c-flight">Lateral Thrust</span></div>
          <div class="axis-row" data-joy="Joy_RYAxis"><span class="axis-dir">Y (F/B)</span><span class="axis-fn c-flight">Vertical Thrust</span></div>
          <div class="axis-row" data-joy="Joy_RZAxis"><span class="axis-dir">Twist</span><span class="axis-fn c-flight">Ahead Thrust</span></div>
          <div class="stick-btn" data-joy="Joy_25">
            <span class="btn-label">BTN 25 &middot; STICK PRESS</span>
            <span class="c-fire">Secondary Fire</span>
          </div>
        </div>
        <!-- Keypad -->
        <div class="keypad-section">
          <div class="keypad-title">4×4 Keypad</div>
          <div class="keypad-grid">
            <!-- Row 1: 1 2 3 A  (mode-multiplexed) -->
            <div class="key key-modes" data-joy="Joy_3">
              <div class="key-cap">1</div>
              <div class="mode-row travel"><span class="mode-tag">T</span><span class="mode-text">Cargo Scoop</span></div>
              <div class="mode-row explo"><span class="mode-tag">E</span><span class="mode-text">FSS Enter</span></div>
              <div class="mode-row mining"><span class="mode-tag">M</span><span class="mode-text">Cargo Scoop</span></div>
              <div class="mode-row combat"><span class="mode-tag">C</span><span class="mode-text">Hardpoints</span></div>
            </div>
            <div class="key key-modes" data-joy="Joy_4">
              <div class="key-cap">2</div>
              <div class="mode-row travel"><span class="mode-tag">T</span><span class="mode-text">Landing Gear</span></div>
              <div class="mode-row explo"><span class="mode-tag">E</span><span class="mode-text">Discovery Scan</span></div>
              <div class="mode-row mining"><span class="mode-tag">M</span><span class="mode-text">Hardpoints</span></div>
              <div class="mode-row combat"><span class="mode-tag">C</span><span class="mode-text">Target Ahead</span></div>
            </div>
            <div class="key key-modes" data-joy="Joy_5">
              <div class="key-cap">3</div>
              <div class="mode-row travel"><span class="mode-tag">T</span><span class="mode-text">Lights</span></div>
              <div class="mode-row explo"><span class="mode-tag">E</span><span class="mode-text">FSS Quit</span></div>
              <div class="mode-row mining"><span class="mode-tag">M</span><span class="mode-text">Fire Group ◀</span></div>
              <div class="mode-row combat"><span class="mode-tag">C</span><span class="mode-text">Fire Group ◀</span></div>
            </div>
            <div class="key key-modes" data-joy="Joy_6">
              <div class="key-cap">A</div>
              <div class="mode-row travel"><span class="mode-tag">T</span><span class="mode-text">Request Dock</span></div>
              <div class="mode-row explo"><span class="mode-tag">E</span><span class="mode-text">FSS Target</span></div>
              <div class="mode-row mining"><span class="mode-tag">M</span><span class="mode-text">Fire Group ▶</span></div>
              <div class="mode-row combat"><span class="mode-tag">C</span><span class="mode-text">Fire Group ▶</span></div>
            </div>
            <!-- Row 2: 4 5 6 B  (mode-multiplexed) -->
