    <!-- Notes -->
    <div class="notes">
      <p><span class="note-icon">▸</span> <strong>How to read mode-multiplexed keys:</strong> the keypad rows 1-3 each show four lines, one per mode. The colored letter (T / E / M / C) tells you which slide-switch position activates that binding. Slide the latching switch to the position whose letter you want, then press the keypad key.</p>
      <p><span class="note-icon">▸</span> <strong>Slide switch is always-on:</strong> exactly one of Joy_27-30 is held at any moment; that's the active mode. Sliding between positions briefly releases one and engages the next — there's no plain (no-modifier) variant of any mode-multiplexed binding, so a slide-gap is harmless (worst case nothing fires for a few ms).</p>
      <p><span class="note-icon">▸</span> <strong>Common bindings (always active regardless of mode):</strong> all stick axes, both stick presses, top row, push buttons, POV hat (cardinals + diagonals), and keypad bottom row.</p>
      <p><span class="note-icon">▸</span> <strong>POV hat diagonals = direct cockpit panel focus:</strong> ↖ Nav, ↗ Comms, ↙ Modules, ↘ Radar. Faster than cycling panels. Mnemonic: top diagonals are "external/social" (Nav and Comms); bottom diagonals are "ship internals" (Modules and Contacts).</p>
      <p><span class="note-icon">▸</span> <strong>Bottom-row power management:</strong> reads `* 0 # D` = `WEP SYS ENG RESET` (combat priority order, reset to neutral on the right corner). Same as a real T16000M four-button pip pad.</p>
      <p><span class="note-icon">▸</span> <strong>Throttle vs. twist:</strong> Left-stick twist is `AheadThrust` — direct fore/aft maneuvering thrust (like fighter jet stick), not throttle. Spring-centers to zero thrust, NOT zero speed. Cruise speed is set by the 0 / 50 / 100 buttons; twist is for kicks and FA-off vector control. Both coexist — throttle holds your cruise; twist gives you a delta.</p>
      <p><span class="note-icon">▸</span> <strong>Pitch axis</strong> is inverted (pull back = nose up).</p>
      <p><span class="note-icon">▸</span> <strong>Stick presses are mode-independent:</strong> primary fire and secondary fire fire in any mode. ED context-switches them automatically (e.g., right-stick-press = Galaxy Map Home in galaxy-map context, FSS Target in FSS context).</p>
      <p><span class="note-icon">▸</span> <strong>Free slots:</strong> Mining mode has slots `9` and `C` reserved for you to fill in once you actually try mining. Edit `LAYOUT` in <code>scripts/gen-4mode-binds.py</code> and re-run.</p>
    </div>
