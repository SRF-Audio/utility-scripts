---
# Hetzner-specific ArgoCD ConfigMap override.
# Applied by Ansible after argocd_deploy role, overwriting the homelab-oriented
# argocd-cm that the role template generates.
#
# Key differences from homelab argocd-cm:
# - url + dex redirectURI point to argocd-hetzner.rohu-shark.ts.net
# - dex.config GitHub clientID/clientSecret reference the `argocd-github-oauth`
#   Secret (materialized by the 1Password Operator from the "ArgoCD Hetzner
#   GitHub OAuth" 1Password item) instead of being templated by Ansible.
#   The Secret must be labeled `app.kubernetes.io/part-of: argocd` for ArgoCD
#   to resolve `$argocd-github-oauth:<key>` references.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  url: https://argocd-hetzner.rohu-shark.ts.net
  accounts.homepage: apiKey
  exec.enabled: "true"
  resource.customizations.health.networking.k8s.io_Ingress: |
    hs = {}
    ann = (obj.metadata and obj.metadata.annotations) or {}
    if ann["gethomepage.dev/enabled"] == "true" then
      hs.status = "Healthy"
      return hs
    end
    ingress = (obj.status and obj.status.loadBalancer and obj.status.loadBalancer.ingress) or {}
    if #ingress > 0 then
      hs.status = "Healthy"
      return hs
    end
    hs.status = "Progressing"
    return hs
  dex.config: |
    connectors:
    - type: github
      id: github
      name: GitHub
      config:
        clientID: $argocd-github-oauth:argocd-hetzner-client-id
        clientSecret: $argocd-github-oauth:argocd-hetzner-client-secret
        redirectURI: https://argocd-hetzner.rohu-shark.ts.net/api/dex/callback
