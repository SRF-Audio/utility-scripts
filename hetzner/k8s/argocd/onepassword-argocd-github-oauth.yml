---
# Materializes the `argocd-github-oauth` Secret in the argocd namespace from
# the shared "Github" 1Password item (HomeLab vault). The 1Password Operator
# mirrors EVERY field of the item into the Secret, but we only reference the
# Hetzner-specific OAuth fields below.
#
# Required 1Password fields (on the existing "Github" item):
#   argocd-hetzner-client-id      — GitHub OAuth App client ID
#   argocd-hetzner-client-secret  — GitHub OAuth App client secret
#
# The Hetzner GitHub OAuth App must use Authorization callback URL
#   https://argocd-hetzner.rohu-shark.ts.net/api/dex/callback
# (separate from the homelab's `argocd-client-id` / `argocd-client-secret`,
# which target argocd.rohu-shark.ts.net).
#
# The 1Password Operator copies these labels onto the generated Secret.
# `app.kubernetes.io/part-of: argocd` is required for ArgoCD to resolve the
# `$argocd-github-oauth:<key>` references in argocd-cm dex.config.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: argocd-github-oauth
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-github-oauth
    app.kubernetes.io/part-of: argocd
spec:
  itemPath: "vaults/HomeLab/items/Github"
