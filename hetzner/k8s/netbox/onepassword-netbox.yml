---
# Single canonical secret for all NetBox credentials.
# Requires a "NetBox" item in the HomeLab 1Password vault with fields:
#   password        — superuser account password
#   secret-key      — Django SECRET_KEY (randomly generated string)
#   db-password     — PostgreSQL password for the netbox database user
#   redis-password  — Redis authentication password
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: netbox
  namespace: infra-netbox
spec:
  itemPath: "vaults/HomeLab/items/NetBox"
