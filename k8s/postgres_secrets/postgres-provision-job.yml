---
# Idempotently provisions additional Postgres users and databases beyond what
# the Bitnami chart creates via auth.username/auth.database. Runs at sync-wave
# 25 (after Postgres is healthy) using coachlight_admin superuser credentials.
# Safe to re-run — all statements use IF NOT EXISTS / DO $$ guards.
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-provision-users
  namespace: db-postgres
  annotations:
    argocd.argoproj.io/sync-wave: "25"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: provision
          image: bitnami/postgresql:17
          command:
            - bash
            - -euo
            - pipefail
            - -c
            - |
              export PGHOST=postgres-postgresql.db-postgres.svc.cluster.local
              export PGPORT=5432
              export PGUSER=coachlight_admin
              export PGPASSWORD="${ADMIN_PASSWORD}"

              provision_user() {
                local user="$1"
                local pass="$2"
                local db="$3"

                psql -d postgres -c "
                  DO \$\$
                  BEGIN
                    IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '${user}') THEN
                      CREATE USER ${user} WITH PASSWORD '${pass}';
                    ELSE
                      ALTER USER ${user} WITH PASSWORD '${pass}';
                    END IF;
                  END
                  \$\$;"

                psql -d postgres -tc \
                  "SELECT 1 FROM pg_database WHERE datname = '${db}'" \
                  | grep -q 1 || psql -d postgres -c \
                  "CREATE DATABASE ${db} OWNER ${user};"

                psql -d postgres -c \
                  "GRANT ALL PRIVILEGES ON DATABASE ${db} TO ${user};"
              }

              provision_user "netbox" "${NETBOX_PASSWORD}" "netbox"
          env:
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-admin-credentials
                  key: password
            - name: NETBOX_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: netbox
                  key: db-password
