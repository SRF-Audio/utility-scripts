---
# Single canonical secret for all NetBox credentials.
# Fields emitted: password, secret-key, db-password, redis-password.
# Replaces the former three-item split (netbox-credentials, netbox-db-credentials,
# netbox-redis-credentials) — those items in HomeLab vault are superseded by "NetBox".
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: netbox
  namespace: infra-netbox
spec:
  itemPath: "vaults/HomeLab/items/NetBox"
