---
# NOTE: Velero requires backup storage configuration.
# The backup storage location and volume snapshot location must be
# configured based on your environment (e.g., S3, Azure, GCS, etc.).
# TODO: Configure backupStorageLocation and volumeSnapshotLocation.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: coachlight-k3s-infra
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: "8.7.0"
    helm:
      valuesObject:
        # CSI support is built into Velero 1.14+ — no external plugin or feature flag needed.

        # Bitnami no longer publishes kubectl images matching k8s 1.34 to Docker Hub.
        # Pin to bitnamilegacy/kubectl:1.33 — functionally identical for CRD upgrades.
        kubectl:
          image:
            repository: bitnamilegacy/kubectl
            tag: "1.33"

        snapshotsEnabled: true
        deployNodeAgent: false
        upgradeCRDs: true
        cleanUpCRDs: false

  destination:
    server: https://kubernetes.default.svc
    namespace: infra-velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
