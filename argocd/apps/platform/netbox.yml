---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netbox
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: coachlight-k3s-infra
  source:
    repoURL: https://netbox-community.github.io/netbox-chart
    chart: netbox
    targetRevision: "5.0.0-beta.145"
    helm:
      valuesObject:
        superuser:
          existingSecret: netbox

        existingSecret: netbox

        persistence:
          enabled: true
          storageClass: "nfs-synology-retain"

        # Use existing PostgreSQL instance
        postgresql:
          enabled: false

        # Use existing Redis instance
        redis:
          enabled: false

        # External database configuration
        externalDatabase:
          host: postgres-postgresql.db-postgres.svc.cluster.local
          port: 5432
          database: netbox
          username: netbox
          existingSecretName: netbox
          existingSecretKey: db-password

        # External Redis configuration
        tasksRedis:
          host: redis-master.db-redis.svc.cluster.local
          port: 6379
          existingSecretName: netbox
          existingSecretKey: redis-password

        cachingRedis:
          host: redis-master.db-redis.svc.cluster.local
          port: 6379
          existingSecretName: netbox
          existingSecretKey: redis-password

        # Initial DB migration on a fresh schema takes >100s — extend startup probe
        startupProbe:
          failureThreshold: 30

        service:
          type: ClusterIP

        # Ingress managed as a standalone manifest in k8s/resources/ingresses/infra-netbox/
        ingress:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: infra-netbox
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
