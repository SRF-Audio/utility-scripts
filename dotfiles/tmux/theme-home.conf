# HOME THEME (vaporwave / monokai-ish)

set -g @tmux_theme "home"

set -g @tmux_bg "#1e1f29"
set -g @tmux_fg "#f8f8f2"

set -g @tmux_accent_pink   "#ff79c6"
set -g @tmux_accent_cyan   "#8be9fd"
set -g @tmux_accent_green  "#50fa7b"
set -g @tmux_accent_purple "#bd93f9"
set -g @tmux_accent_yellow "#f1fa8c"
set -g @tmux_muted         "#44475a"

# Status bar: base + explicit styling of left/right sections
set -g status-style "bg=#{@tmux_bg},fg=#{@tmux_accent_cyan}"
set -g status-left-style  "bg=#{@tmux_bg},fg=#{@tmux_accent_cyan}"
set -g status-right-style "bg=#{@tmux_bg},fg=#{@tmux_accent_cyan}"

# Give left/right their theme colors without changing their "content"
set -g status-left  "#[fg=#{@tmux_accent_green}] #[fg=#{@tmux_accent_cyan}]#S "
set -g status-right "#(~/.local/bin/tailscale_tmux_status) #[fg=#{@tmux_accent_purple}]%Y-%m-%d #[fg=#{@tmux_accent_yellow}]%H:%M:%S "

# Windows
setw -g window-status-style          "bg=#{@tmux_bg},fg=#{@tmux_accent_purple}"
setw -g window-status-format         " #[fg=#{@tmux_accent_purple}]#I #[fg=#{@tmux_fg}]#W "
setw -g window-status-current-style  "bg=#{@tmux_bg},fg=#{@tmux_accent_pink},bold"
setw -g window-status-current-format " #[fg=#{@tmux_bg},bg=#{@tmux_accent_pink},bold] #I #W #[fg=#{@tmux_accent_pink},bg=#{@tmux_bg}]"

# Pane borders
set -g pane-border-style        "fg=#{@tmux_muted}"
set -g pane-active-border-style "fg=#{@tmux_accent_pink}"
set -g pane-border-format       " #P: #T "

# Command / copy-mode
set -g message-style "bg=#{@tmux_accent_pink},fg=#{@tmux_bg},bold"
setw -g mode-style   "bg=#{@tmux_accent_purple},fg=#{@tmux_bg},bold"

# Pane number overlay (prefix + q) MUST be literal colours
set -g display-panes-active-colour "#50fa7b"
set -g display-panes-colour        "#bd93f9"
