# WORK THEME (sky / cloud / comet)

set -g @tmux_theme "work"

set -g @tmux_bg "#081020"
set -g @tmux_fg "#EAF2FF"

set -g @tmux_accent_cyan   "#78AED9"
set -g @tmux_accent_purple "#3868B0"
set -g @tmux_accent_green  "#BFE6FF"
set -g @tmux_accent_yellow "#FFFFFF"
set -g @tmux_accent_pink   "#F69695"

set -g @tmux_muted "#334B73"

# Status bar
set -g status-style "bg=#{@tmux_bg},fg=#{@tmux_accent_cyan}"
set -g status-left-style  "bg=#{@tmux_bg},fg=#{@tmux_accent_cyan}"
set -g status-right-style "bg=#{@tmux_bg},fg=#{@tmux_accent_cyan}"

# Same structure as home, different palette
set -g status-left  "#[fg=#{@tmux_accent_green}] #[fg=#{@tmux_accent_cyan}]#S "
set -g status-right "#(~/.local/bin/tailscale_tmux_status) #[fg=#{@tmux_accent_purple}]%Y-%m-%d #[fg=#{@tmux_accent_yellow}]%H:%M:%S "

# Windows
setw -g window-status-style          "bg=#{@tmux_bg},fg=#{@tmux_muted}"
setw -g window-status-format         " #[fg=#{@tmux_muted}]#I #[fg=#{@tmux_fg}]#W "
setw -g window-status-current-style  "bg=#{@tmux_bg},fg=#{@tmux_accent_cyan},bold"
setw -g window-status-current-format " #[fg=#{@tmux_bg},bg=#{@tmux_accent_cyan},bold] #I #W #[fg=#{@tmux_accent_cyan},bg=#{@tmux_bg}]"

# Pane borders
set -g pane-border-style        "fg=#{@tmux_muted}"
set -g pane-active-border-style "fg=#{@tmux_accent_cyan}"
set -g pane-border-format       " #P: #T "

# Messages / copy-mode
set -g message-style "bg=#{@tmux_accent_cyan},fg=#{@tmux_bg},bold"
setw -g mode-style   "bg=#{@tmux_accent_purple},fg=#{@tmux_fg},bold"

# Pane number overlay MUST be literal colours
set -g display-panes-active-colour "#FFFFFF"
set -g display-panes-colour        "#F69695"
