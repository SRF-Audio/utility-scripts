##### Prefix ###################################################################
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

##### Basics ###################################################################
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 50000
set -g allow-rename off
set -g automatic-rename off

set -g mouse on
setw -g mode-keys vi

##### Panes & windows #########################################################
bind | split-window -h
bind - split-window -v

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r M-Left  resize-pane -L 2
bind -r M-Right resize-pane -R 2
bind -r M-Up    resize-pane -U 1
bind -r M-Down  resize-pane -D 1

bind -n C-Left  select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up    select-pane -U
bind -n C-Down  select-pane -D

##### Status bar structure (shared) ############################################
set -g status-position top
set -g status on
set -g status-interval 5
set -g status-left-length 80
set -g status-right-length 140

# IMPORTANT:
# - No theme variables here.
# - Themes set the colors/styles, and these just provide content.
set -g status-left  " #S "
set -g status-right " #(~/.local/bin/tailscale_tmux_status) %Y-%m-%d %H:%M:%S "

##### Reload ###################################################################
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

##### Theme load + toggle ######################################################
# Default theme if none set yet
if -F '#{==:#{@tmux_theme},}' 'set -g @tmux_theme home' ''

# Load the selected theme (or home by default)
if -F '#{==:#{@tmux_theme},work}' \
  'source-file ~/.tmux/theme-work.conf' \
  'source-file ~/.tmux/theme-home.conf'

# tmux default: prefix+t = clock. We want theme toggle.
unbind t
bind t run-shell ' \
  cur="$(tmux show -gv @tmux_theme 2>/dev/null)"; \
  if [ "$cur" = "work" ]; then \
    tmux set -g @tmux_theme home; \
    tmux source-file ~/.tmux/theme-home.conf; \
    tmux display-message "Theme: home"; \
  else \
    tmux set -g @tmux_theme work; \
    tmux source-file ~/.tmux/theme-work.conf; \
    tmux display-message "Theme: work"; \
  fi; \
  tmux refresh-client -S \
'
