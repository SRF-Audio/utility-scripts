# Personal and homelab static hosts.
# k3s VM nodes are NOT here — Ansible writes those to 30-homelab-k3s.conf.

# ── Coachlight Proxmox nodes (bare-metal, LAN) ────────────────────────────────
Host coachlight-homelab-1
    HostName 192.168.226.90
    User sfroeber

Host coachlight-homelab-2
    HostName 192.168.226.91
    User sfroeber

Host coachlight-homelab-3
    HostName 192.168.226.92
    User sfroeber

# ── Git forges ────────────────────────────────────────────────────────────────
Host gitlab.com
    HostName gitlab.com
    User git

Host github.com
    HostName github.com
    User git

# ── Synology NAS (srfaudio, Tailscale) ───────────────────────────────────────
# SSH key managed by ansible: synology-backup role.
Host srfaudio.rohu-shark.ts.net
    User stephenfroeber
    IdentityFile ~/.ssh/synology-1813.pub
    IdentitiesOnly yes
    StrictHostKeyChecking accept-new
