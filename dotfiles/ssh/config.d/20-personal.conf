# Personal and homelab static hosts.
# k3s VM nodes are NOT here — Ansible writes those to 30-homelab-k3s.conf.

# ── Coachlight Proxmox nodes (bare-metal, LAN) ────────────────────────────────
Host coachlight-homelab-1
    HostName 192.168.226.90
    User sfroeber

Host coachlight-homelab-2
    HostName 192.168.226.91
    User sfroeber

Host coachlight-homelab-3
    HostName 192.168.226.92
    User sfroeber

# ── Git forges ────────────────────────────────────────────────────────────────
Host gitlab.com
    HostName gitlab.com
    User git

Host github.com
    HostName github.com
    User git

# ── Synology NAS (srfaudio, Tailscale) ───────────────────────────────────────
# Auth via 1Password agent. IdentityFile hints which key to offer first
# (avoids DSM's MaxAuthTries limit when agent has many keys); no IdentitiesOnly
# so the agent can still fall back to other keys if needed.
Host srfaudio.rohu-shark.ts.net
    User stephenfroeber
    IdentityFile ~/.ssh/synology-1813.pub
    StrictHostKeyChecking accept-new
