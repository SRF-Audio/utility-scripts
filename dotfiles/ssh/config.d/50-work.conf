# Work hosts — CACI / Altitude / NexGen.
# These are static snapshots; update when infra changes.

# ── CACI ─────────────────────────────────────────────────────────────────────
Host caci-gitlab-runner-aws
    HostName 54.145.46.230
    User ec2-user

# ── Shift / Altitude ──────────────────────────────────────────────────────────
Host shift-test-jumpbox
    HostName 3.91.3.74
    User ec2-user
    IdentityFile /home/sfroeber/.ssh/shift_test_jumpbox_key.pem
    IdentitiesOnly yes
    StrictHostKeyChecking no
    ControlMaster auto
    ControlPath /home/sfroeber/.ssh/control-%r@%h:%p
    DynamicForward 127.0.0.1:1081
    ServerAliveInterval 30
    ServerAliveCountMax 3

# ── NexGen dev cluster ────────────────────────────────────────────────────────
Host nexgen-dev-proxy-tunnel
    HostName 52.95.251.48
    User ec2-user
    IdentityFile /home/devuser/.ssh/nexgen-dev-key.pem
    IdentitiesOnly yes
    DynamicForward 127.0.0.1:1080
    ExitOnForwardFailure yes
    StrictHostKeyChecking accept-new
    ControlMaster auto
    ControlPath ~/.ssh/cm-%r@%h:%p
    ControlPersist 60m
    ServerAliveInterval 30
    ServerAliveCountMax 3

Host nexgen-dev-bastion
    HostName 52.95.251.48
    User ec2-user
    IdentityFile /home/devuser/.ssh/nexgen-dev-key.pem
    IdentitiesOnly yes
    StrictHostKeyChecking accept-new
    ControlMaster auto
    ControlPath ~/.ssh/cm-%r@%h:%p
    ControlPersist 60m
    ServerAliveInterval 30
    ServerAliveCountMax 3

