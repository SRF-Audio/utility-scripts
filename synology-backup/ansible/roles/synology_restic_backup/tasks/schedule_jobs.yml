---
# synology_restic_backup/tasks/schedule_jobs.yml
#
# DSM 7.x does not ship the crontab binary, so ansible.builtin.cron cannot be
# used. Jobs are written directly to /etc/crontab (system crontab format with
# a username column) via blockinfile for idempotent management.

- name: Write restic cron jobs to /etc/crontab
  ansible.builtin.blockinfile:
    path: /etc/crontab
    marker: "# {mark} ANSIBLE MANAGED — restic-backup"
    block: |
      {{ synology_restic_backup_cron_backup_minute }}	{{ synology_restic_backup_cron_backup_hour }}	*	*	{{ synology_restic_backup_cron_backup_weekday }}	root	{{ synology_restic_backup_scripts_dir }}/backup.sh
      {{ synology_restic_backup_cron_forget_minute }}	{{ synology_restic_backup_cron_forget_hour }}	*	*	{{ synology_restic_backup_cron_forget_weekday }}	root	{{ synology_restic_backup_scripts_dir }}/forget.sh
      {{ synology_restic_backup_cron_check_minute }}	{{ synology_restic_backup_cron_check_hour }}	*	*	{{ synology_restic_backup_cron_check_weekday }}	root	{{ synology_restic_backup_scripts_dir }}/check.sh
  become: true
