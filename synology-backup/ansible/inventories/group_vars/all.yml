---
# Prefer Tailscale address when ts_ip is defined; fall back to LAN IP or hostname.
connection_preference: tailnet

ansible_host: >-
  {{
    (
      connection_preference == 'tailnet'
      and (ts_ip | default('') | length > 0)
    )
    | ternary(
        ts_ip,
        lan_ip | default(inventory_hostname)
      )
  }}

# Use the 1Password SSH agent exclusively. Set SSH_AUTH_SOCK or ensure
# ~/.1password/agent.sock exists (1Password desktop app, SSH agent enabled).
ansible_ssh_common_args: >-
  -o IdentityAgent=~/.1password/agent.sock
  -o IdentitiesOnly=yes
  -o StrictHostKeyChecking=accept-new
