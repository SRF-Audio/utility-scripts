---
# stephenfroeber has passwordless sudo configured via /etc/sudoers.d/stephenfroeber.
# SSH auth uses the 1Password agent (Synology 1813 SSH Key, ~/.ssh/synology-1813.pub).
ansible_user: stephenfroeber
ansible_password: "{{ lookup('community.general.onepassword', 'oattlsmrtkwf6ppnvvo24shk24', field='password', vault='HomeLab') }}"
ansible_become: true
ansible_become_method: sudo

# DSM 7 ships Python 3 at this path when the "Python 3.x" package is installed
# via Synology Package Center. Install it before running this playbook.
ansible_python_interpreter: /usr/bin/python3

synology_restic_backup_trello_alerts_enabled: true
